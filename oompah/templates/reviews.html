
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>oompah - Reviews</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --text-muted: #7d8590; --accent: #58a6ff;
      --green: #3fb950; --red: #f85149; --yellow: #e2b340; --purple: #bc8cff;
    }
    html { font-size: 125%; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border); }
    .toolbar h1 { font-size: 1.25rem; color: var(--accent); font-weight: 700; }
    .toolbar h1 a { color: var(--accent); text-decoration: none; }
    .toolbar h1 span { color: var(--text-muted); font-weight: 400; }
    button { background: var(--surface); color: var(--accent); border: 1px solid var(--border); padding: 0.3rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
    button:hover { background: rgba(88, 166, 255, 0.1); }
    .content { max-width: 1000px; margin: 1.5rem auto; padding: 0 1.5rem; }
    .summary-bar { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
    .summary-bar strong { color: var(--text); }
    .project-section { margin-bottom: 2rem; }
    .project-header { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .provider-badge { font-size: 0.6rem; font-weight: 700; padding: 0.15rem 0.45rem; border-radius: 10px; text-transform: uppercase; }
    .provider-github { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
    .provider-gitlab { background: rgba(226, 131, 64, 0.15); color: #e8833f; }
    .review-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem; margin-bottom: 0.5rem; }
    .review-card:hover { border-color: var(--accent); }
    .review-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.35rem; }
    .review-title { font-weight: 600; font-size: 0.9rem; }
    .review-title a { color: var(--text); text-decoration: none; }
    .review-title a:hover { color: var(--accent); text-decoration: underline; }
    .review-id { color: var(--text-muted); font-size: 0.75rem; font-weight: 400; }
    .review-meta { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--text-muted); flex-wrap: wrap; align-items: center; }
    .review-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.4rem; line-height: 1.4; max-height: 3.6em; overflow: hidden; }
    .draft-badge { background: rgba(125, 133, 144, 0.2); color: var(--text-muted); font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 8px; font-weight: 600; }
    .ci-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.2rem; vertical-align: middle; }
    .ci-passed { background: var(--green); }
    .ci-failed { background: var(--red); }
    .ci-pending { background: var(--yellow); }
    .branch-info { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 0.7rem; background: rgba(88, 166, 255, 0.08); padding: 0.1rem 0.35rem; border-radius: 4px; }
    .label-tag { display: inline-block; font-size: 0.65rem; padding: 0.1rem 0.35rem; border-radius: 4px; background: rgba(188, 140, 255, 0.15); color: var(--purple); margin-left: 0.25rem; }
    .diff-stat { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 0.7rem; }
    .diff-add { color: var(--green); }
    .diff-del { color: var(--red); }
    .review-card.needs-rebase { border-color: var(--yellow); }
    .review-card.has-conflicts { border-color: var(--red); }
    .rebase-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.4rem; border-radius: 8px; background: rgba(226, 179, 64, 0.15); color: var(--yellow); text-transform: uppercase; }
    .conflict-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.4rem; border-radius: 8px; background: rgba(248, 81, 73, 0.15); color: var(--red); text-transform: uppercase; }
    /* Passive "Auto-resolving…" indicator shown instead of the manual
       "Resolve Conflicts" button on YOLO-enabled projects — YOLO will
       try provider.rebase_review then fall back to notifying the task
       on its own (oompah-zlz_2-zvf2). Calmer yellow tone communicates
       "in progress" rather than red "operator action required". */
    .conflict-badge.auto-resolving { background: rgba(226, 179, 64, 0.15); color: var(--yellow); text-transform: none; font-weight: 600; }
    .agent-active-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.4rem; border-radius: 8px; background: rgba(56, 139, 253, 0.15); color: var(--blue); text-transform: uppercase; }
    .btn-rebase { background: rgba(226, 179, 64, 0.15); color: var(--yellow); border-color: rgba(226, 179, 64, 0.3); font-size: 0.65rem; padding: 0.15rem 0.5rem; vertical-align: middle; }
    .btn-rebase:hover { background: rgba(226, 179, 64, 0.25); }
    .btn-rebase:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-rebase.success { background: rgba(63, 185, 80, 0.15); color: var(--green); border-color: rgba(63, 185, 80, 0.3); }
    .btn-rebase.failed { background: rgba(248, 81, 73, 0.15); color: var(--red); border-color: rgba(248, 81, 73, 0.3); }
    .btn-resolve { background: rgba(248, 81, 73, 0.15); color: var(--red); border-color: rgba(248, 81, 73, 0.3); font-size: 0.65rem; padding: 0.15rem 0.5rem; vertical-align: middle; }
    .btn-resolve:hover { background: rgba(248, 81, 73, 0.25); }
    .btn-resolve:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-resolve.success { background: rgba(63, 185, 80, 0.15); color: var(--green); border-color: rgba(63, 185, 80, 0.3); }
    .btn-retry { background: rgba(248, 81, 73, 0.15); color: var(--red); border-color: rgba(248, 81, 73, 0.3); font-size: 0.65rem; padding: 0.15rem 0.5rem; vertical-align: middle; }
    .btn-retry:hover { background: rgba(248, 81, 73, 0.25); }
    .btn-retry:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-retry.success { background: rgba(63, 185, 80, 0.15); color: var(--green); border-color: rgba(63, 185, 80, 0.3); }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    .loading { text-align: center; padding: 3rem; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 0.75rem; }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { text-align: center; padding: 2rem; color: var(--red); }
    /* Queue status column — surfaces auto_merge_enabled / mergeable_state per PR.
       Order matches dashboard reviews-badge intent so operators see the same
       vocabulary on hover/inspection (oompah-zlz_2-btf.3). */
    .queue-status { display: inline-block; font-size: 0.65rem; font-weight: 700;
      padding: 0.1rem 0.45rem; border-radius: 8px; text-transform: uppercase;
      letter-spacing: 0.02em; cursor: help; }
    .queue-status.queue-in-queue { background: rgba(63, 185, 80, 0.18); color: var(--green); }
    .queue-status.queue-ready { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
    .queue-status.queue-blocked-config { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .queue-status.queue-behind { background: rgba(226, 179, 64, 0.15); color: var(--yellow); }
    .queue-status.queue-conflict { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .queue-status.queue-draft { background: rgba(125, 133, 144, 0.2); color: var(--text-muted); }
    .queue-status.queue-ci-pending { background: rgba(226, 179, 64, 0.15); color: var(--yellow); }
    .queue-status.queue-ci-failed { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .queue-status.queue-unknown { background: rgba(125, 133, 144, 0.15); color: var(--text-muted); }
    /* Sort selector */
    .sort-bar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.85rem;
      font-size: 0.75rem; color: var(--text-muted); }
    .sort-bar select { background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px; padding: 0.2rem 0.4rem;
      font-size: 0.75rem; }
  </style>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      fetch('/api/v1/errors', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          source: 'frontend',
          message: String(msg).slice(0, 200),
          detail: (err && err.stack) || (src + ':' + line + ':' + col),
          priority: 3
        })
      }).catch(function() {});
    };
    window.addEventListener('unhandledrejection', function(e) {
      var msg = e.reason ? (e.reason.message || String(e.reason)) : 'Unhandled promise rejection';
      fetch('/api/v1/errors', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          source: 'frontend',
          message: msg.slice(0, 200),
          detail: e.reason && e.reason.stack,
          priority: 3
        })
      }).catch(function() {});
    });
  </script>
</head>
<body>
  <div class="toolbar">
    <h1><a href="/">oompah</a> <span>/ Reviews</span></h1>
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <select id="project-filter" onchange="onProjectChange()" style="display:none;padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);">
        <option value="">All Projects</option>
      </select>
      <button onclick="loadReviews()">Refresh</button>
      <button onclick="window.location='/'">Dashboard</button>
    </div>
  </div>

  <div class="content">
    <div class="summary-bar" id="summary-bar"></div>
    <div class="sort-bar" id="sort-bar" style="display:none;">
      <label for="sort-select">Sort:</label>
      <select id="sort-select" onchange="onSortChange()">
        <option value="default">Default (project, recency)</option>
        <option value="queue">Queue status</option>
      </select>
    </div>
    <div id="reviews-container"><div class="loading" role="status" aria-label="Loading reviews"><svg class="spinner" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg>Loading reviews…</div></div>
  </div>

<script>
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const now = new Date();
  const diffMs = now - d;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 60) return mins + 'm ago';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + 'h ago';
  const days = Math.floor(hours / 24);
  return days + 'd ago';
}

async function loadReviews(silent = false) {
  const container = document.getElementById('reviews-container');
  if (!silent) {
    container.innerHTML = '<div class="loading" role="status" aria-label="Loading reviews"><svg class="spinner" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg>Loading reviews…</div>';
  }

  try {
    const res = await fetch('/api/v1/reviews');
    if (!res.ok) {
      const err = await res.json();
      container.innerHTML = '<div class="error-msg">Failed to load reviews: ' +
        esc((err.error && err.error.message) || 'unknown error') + '</div>';
      return;
    }
    const data = await res.json();
    renderReviews(data);
  } catch(e) {
    if (!silent) {
      container.innerHTML = '<div class="error-msg">Failed to load reviews: ' + esc(e.message) + '</div>';
    }
  }
}

// Cache the most recent /api/v1/reviews payload so the sort selector
// can re-render without a network round trip.
let _lastReviewsData = [];

function renderReviews(data) {
  _lastReviewsData = data;
  const container = document.getElementById('reviews-container');
  const summaryBar = document.getElementById('summary-bar');
  const sortBar = document.getElementById('sort-bar');

  if (data.length === 0) {
    container.innerHTML = '<div class="empty-state">No open reviews.</div>';
    summaryBar.innerHTML = '';
    if (sortBar) sortBar.style.display = 'none';
    return;
  }
  if (sortBar) sortBar.style.display = '';

  const sortMode = (document.getElementById('sort-select') || {}).value || 'default';

  // Summary (always over the unfiltered set)
  const totalReviews = data.length;
  const drafts = data.filter(d => d.review.draft).length;
  const conflicts = data.filter(d => d.review.has_conflicts).length;
  const queued = data.filter(d => d.review.auto_merge_enabled).length;
  let summaryHtml = '<span>Open: <strong>' + totalReviews + '</strong></span>';
  if (queued > 0) summaryHtml += '<span style="color:var(--green);">In queue: <strong>' + queued + '</strong></span>';
  if (conflicts > 0) summaryHtml += '<span style="color:var(--red);">Conflicts: <strong>' + conflicts + '</strong></span>';
  if (drafts > 0) summaryHtml += '<span>Drafts: <strong>' + drafts + '</strong></span>';

  let html = '';
  if (sortMode === 'queue') {
    // Flat list, sorted by queue rank then by project for stable grouping
    // within a status. Project header still shown so operators don't lose
    // multi-repo context.
    const rows = data.map(item => ({
      item,
      qs: deriveQueueStatus(item.review || {}),
    }));
    rows.sort((a, b) => {
      if (a.qs.sortRank !== b.qs.sortRank) return a.qs.sortRank - b.qs.sortRank;
      const an = (a.item.project_name || '').toLowerCase();
      const bn = (b.item.project_name || '').toLowerCase();
      if (an !== bn) return an < bn ? -1 : 1;
      const at = a.item.review && a.item.review.created_at ? a.item.review.created_at : '';
      const bt = b.item.review && b.item.review.created_at ? b.item.review.created_at : '';
      return bt.localeCompare(at);
    });
    summaryHtml += '<span>Sorted by: <strong>queue status</strong></span>';
    summaryBar.innerHTML = summaryHtml;

    let currentLabel = null;
    for (const row of rows) {
      if (row.qs.label !== currentLabel) {
        currentLabel = row.qs.label;
        html += '<div class="project-header" style="margin-top:1.25rem;">'
          + '<span class="queue-status ' + row.qs.cls + '">' + esc(currentLabel) + '</span>'
          + '</div>';
      }
      const review = row.item.review;
      review.agent_active = row.item.agent_active || false;
      const provider = row.item.provider;
      const providerLabel = provider === 'github' ? 'GitHub' : 'GitLab';
      const card = renderReviewCard(review, provider, row.item.project_id, !!row.item.project_yolo);
      // Inline project name on each card since we no longer group by project.
      const projectChip = ' <span style="color:var(--text-muted);font-size:0.7rem;">'
        + esc(row.item.project_name) + ' · ' + providerLabel + '</span>';
      html += card.replace('<span class="review-id">', projectChip + '<span class="review-id">');
    }
    container.innerHTML = html;
    return;
  }

  // Default: group by project
  const byProject = {};
  for (const item of data) {
    const key = item.project_name;
    if (!byProject[key]) byProject[key] = {
      provider: item.provider,
      project_id: item.project_id,
      project_yolo: !!item.project_yolo,
      reviews: [],
    };
    const review = item.review;
    review.agent_active = item.agent_active || false;
    byProject[key].reviews.push(review);
  }
  const projectCount = Object.keys(byProject).length;
  summaryHtml += '<span>Projects: <strong>' + projectCount + '</strong></span>';
  summaryBar.innerHTML = summaryHtml;

  for (const [projectName, group] of Object.entries(byProject)) {
    const providerClass = 'provider-' + group.provider;
    const providerLabel = group.provider === 'github' ? 'GitHub' : 'GitLab';
    const reviewLabel = group.provider === 'github' ? 'PRs' : 'MRs';

    html += '<div class="project-section">';
    html += '<div class="project-header">' + esc(projectName) +
      ' <span class="provider-badge ' + providerClass + '">' + providerLabel + '</span>' +
      ' <span style="color:var(--text-muted);font-size:0.8rem;font-weight:400;">' +
      group.reviews.length + ' open ' + reviewLabel + '</span></div>';

    for (const r of group.reviews) {
      html += renderReviewCard(r, group.provider, group.project_id, group.project_yolo);
    }
    html += '</div>';
  }

  container.innerHTML = html;
}

const SORT_STORAGE_KEY = 'oompah_reviews_sort';

function onSortChange() {
  const sel = document.getElementById('sort-select');
  if (!sel) return;
  try { localStorage.setItem(SORT_STORAGE_KEY, sel.value); } catch (e) {}
  renderReviews(_lastReviewsData);
}

function _restoreSortPreference() {
  const sel = document.getElementById('sort-select');
  if (!sel) return;
  try {
    const saved = localStorage.getItem(SORT_STORAGE_KEY);
    if (saved) sel.value = saved;
  } catch (e) {}
}

// deriveQueueStatus — translates per-PR queue fields into a friendly
// label + CSS class + inline title-bar emoji. Order of checks is the
// AC priority order from oompah-zlz_2-btf.3 so the most actionable
// state wins (e.g. a 'conflict' PR with auto_merge_enabled is shown
// as 'conflict', not 'in queue').
function deriveQueueStatus(r) {
  const ms = (r && r.mergeable_state) ? String(r.mergeable_state).toLowerCase() : '';
  const ci = (r && r.ci_status) ? String(r.ci_status).toLowerCase() : '';
  const ame = !!(r && r.auto_merge_enabled);
  const draft = !!(r && r.draft);
  const conflicts = !!(r && r.has_conflicts);

  // 1. Conflicts always win — operator must rebase/resolve.
  if (conflicts || ms === 'dirty') {
    return {label: 'conflict', cls: 'queue-conflict', emoji: '⚠', sortRank: 0};
  }
  // 2. Draft PRs are intentional, but not eligible for queue.
  if (draft || ms === 'draft') {
    return {label: 'draft', cls: 'queue-draft', emoji: '📝', sortRank: 7};
  }
  // 3. Already accepted into the GitHub merge queue.
  //    'unknown' = GitHub still computing mergeable; for queued PRs treat
  //    same as '' since the queue is already handling it.
  //    'blocked' = GitHub's "you can't directly merge — the queue is
  //    handling it"; default state of a queued PR until the queue's
  //    synthetic merge_group commit passes CI (oompah-zlz_2-j5f).
  if (ame && (ms === 'clean' || ms === 'unstable' || ms === 'behind' || ms === '' || ms === 'unknown' || ms === 'blocked')) {
    return {label: 'in queue', cls: 'queue-in-queue', emoji: '⏳', sortRank: 5};
  }
  // 4. Behind base (rebase needed) — visible regardless of auto-merge.
  if (ms === 'behind') {
    return {label: 'behind base', cls: 'queue-behind', emoji: '↻', sortRank: 3};
  }
  // 5. CI signal beats raw mergeable_state for the remaining cases.
  if (ci === 'failed') {
    return {label: 'ci failed', cls: 'queue-ci-failed', emoji: '✗', sortRank: 1};
  }
  if (ci === 'pending') {
    return {label: 'ci pending', cls: 'queue-ci-pending', emoji: '◐', sortRank: 4};
  }
  // 6. mergeable_state=blocked + no auto_merge means GitHub is rejecting
  //    enqueue — usually allow_auto_merge is off or a required check is
  //    missing. Surface as actionable.
  if (!ame && ms === 'blocked') {
    return {label: 'blocked: needs config', cls: 'queue-blocked-config', emoji: '⚠', sortRank: 2};
  }
  // 7. CI passed, no auto_merge yet — yolo will enqueue next tick.
  if (!ame && (ms === 'clean' || ms === 'unstable') && ci === 'passed') {
    return {label: 'ready', cls: 'queue-ready', emoji: '✓', sortRank: 6};
  }
  // 8. Anything else (has_hooks, missing fields) — show raw or n/a.
  //    'unknown' = GitHub still computing; render as '—' rather than the
  //    confusing literal "unknown" (oompah-zlz_2-aza follow-up).
  if (ms === 'unknown') {
    return {label: '—', cls: 'queue-unknown', emoji: '', sortRank: 8};
  }
  return {label: ms || '—', cls: 'queue-unknown', emoji: '', sortRank: 8};
}

function renderReviewCard(r, provider, projectId, projectYolo) {
  const idPrefix = provider === 'github' ? '#' : '!';

  let agentHtml = '';
  if (r.agent_active) {
    agentHtml = ' <span class="agent-active-badge">Agent working on fix</span>';
  }

  let ciHtml = '';
  if (r.ci_status) {
    ciHtml = '<span><span class="ci-dot ci-' + r.ci_status + '"></span>' + r.ci_status + '</span>';
    if (r.ci_status === 'failed' && !r.agent_active) {
      ciHtml += ' <button class="btn-retry" onclick="retryReview(\'' + esc(projectId) + '\', \'' + esc(r.id) + '\', this)">Retry</button>';
    }
  }

  let draftHtml = r.draft ? ' <span class="draft-badge">Draft</span>' : '';

  let rebaseHtml = '';
  if (r.agent_active) {
    // Agent is handling it — no action buttons needed
  } else if (r.has_conflicts) {
    // On YOLO-enabled projects, the orchestrator's _yolo_notify_conflict
    // path already tries provider.rebase_review then falls back to the
    // bead-notify behavior on every full-sync tick. The "Resolve Conflicts"
    // button does the same thing manually — redundant friction. Hide it
    // and show a passive indicator instead (oompah-zlz_2-zvf2). Non-YOLO
    // projects still get the manual button.
    if (projectYolo) {
      rebaseHtml = ' <span class="conflict-badge">Merge Conflicts</span>' +
        ' <span class="conflict-badge auto-resolving" title="YOLO will retry rebase or dispatch an agent on the next full-sync tick">Auto-resolving…</span>';
    } else {
      rebaseHtml = ' <span class="conflict-badge">Merge Conflicts</span>' +
        ' <button class="btn-resolve" ' +
        'onclick="resolveConflicts(\'' + esc(projectId) + '\', \'' + esc(r.id) + '\', this)">Resolve Conflicts</button>';
    }
  } else if (r.needs_rebase) {
    rebaseHtml = ' <span class="rebase-badge">Needs Rebase</span>' +
      ' <button class="btn-rebase" ' +
      'onclick="triggerRebase(\'' + esc(projectId) + '\', \'' + esc(r.id) + '\', this)">Rebase</button>';
  }

  let labelsHtml = '';
  if (r.labels && r.labels.length > 0) {
    labelsHtml = r.labels.map(l => '<span class="label-tag">' + esc(l) + '</span>').join('');
  }

  let diffHtml = '';
  if (r.additions > 0 || r.deletions > 0) {
    diffHtml = '<span class="diff-stat"><span class="diff-add">+' + r.additions + '</span> ' +
      '<span class="diff-del">-' + r.deletions + '</span></span>';
  }

  let descHtml = '';
  if (r.description) {
    descHtml = '<div class="review-desc">' + esc(r.description) + '</div>';
  }

  let reviewersHtml = '';
  if (r.reviewers && r.reviewers.length > 0) {
    reviewersHtml = '<span>Reviewers: ' + r.reviewers.map(v => esc(v)).join(', ') + '</span>';
  }

  // Queue status — derive once, surface as a chip on the meta row and
  // a small emoji prefix next to the title. Tooltip shows the raw
  // GitHub mergeable_state plus auto_merge_enabled for diagnostics.
  const qs = deriveQueueStatus(r);
  const qsTooltip = 'mergeable_state=' + (r.mergeable_state || '(empty)') +
    ', auto_merge_enabled=' + (r.auto_merge_enabled ? 'true' : 'false');
  const queueChipHtml = '<span class="queue-status ' + qs.cls + '" title="' +
    esc(qsTooltip) + '">' + esc(qs.label) + '</span>';
  const queueEmojiHtml = qs.emoji
    ? ' <span title="' + esc(qsTooltip) + '" style="cursor:help;">' + esc(qs.emoji) + '</span>'
    : '';

  return `
    <div class="review-card ${r.has_conflicts ? 'has-conflicts' : r.needs_rebase ? 'needs-rebase' : ''}">
      <div class="review-header">
        <div class="review-title">
          <a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title)}</a>${queueEmojiHtml}
          ${draftHtml}${agentHtml}${rebaseHtml}${labelsHtml}
          <span class="review-id">${idPrefix}${esc(r.id)}</span>
        </div>
        ${diffHtml}
      </div>
      <div class="review-meta">
        ${queueChipHtml}
        <span>${esc(r.author)}</span>
        <span class="branch-info">${esc(r.source_branch)} &rarr; ${esc(r.target_branch)}</span>
        ${ciHtml}
        <span>${timeAgo(r.created_at)}</span>
        ${reviewersHtml}
      </div>
      ${descHtml}
    </div>
  `;
}

async function triggerRebase(projectId, reviewId, btn) {
  btn.disabled = true;
  btn.textContent = 'Rebasing...';
  try {
    const res = await fetch('/api/v1/reviews/' + encodeURIComponent(projectId) + '/' + encodeURIComponent(reviewId) + '/rebase', {
      method: 'POST',
    });
    const data = await res.json();
    if (data.success) {
      btn.textContent = 'Done';
      btn.className = 'btn-rebase success';
      setTimeout(() => loadReviews(), 2000);
    } else {
      btn.className = 'btn-rebase failed';
      btn.disabled = false;
      const msg = (data.message || '').toLowerCase();
      if (msg.includes('conflict') && data.notified_issue) {
        btn.textContent = 'Conflicts — notified ' + data.notified_issue;
        btn.className = 'btn-rebase success';
        btn.disabled = true;
      } else if (msg.includes('conflict')) {
        btn.textContent = 'Conflicts — no matching task found';
      } else {
        btn.textContent = 'Failed';
      }
    }
  } catch(e) {
    btn.textContent = 'Error';
    btn.className = 'btn-rebase failed';
    btn.disabled = false;
  }
}

async function resolveConflicts(projectId, reviewId, btn) {
  btn.disabled = true;
  btn.textContent = 'Notifying agent...';
  try {
    const res = await fetch('/api/v1/reviews/' + encodeURIComponent(projectId) + '/' + encodeURIComponent(reviewId) + '/rebase', {
      method: 'POST',
    });
    const data = await res.json();
    if (data.notified_issue) {
      btn.textContent = 'Agent notified (' + data.notified_issue + ')';
      btn.className = 'btn-resolve success';
    } else if (data.success) {
      btn.textContent = 'Rebased';
      btn.className = 'btn-resolve success';
      setTimeout(() => loadReviews(), 2000);
    } else {
      btn.textContent = 'No matching task found';
      btn.className = 'btn-resolve';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = 'Error';
    btn.className = 'btn-resolve';
    btn.disabled = false;
  }
}

async function retryReview(projectId, reviewId, btn) {
  btn.disabled = true;
  btn.textContent = 'Reopening...';
  try {
    const res = await fetch('/api/v1/reviews/' + encodeURIComponent(projectId) + '/' + encodeURIComponent(reviewId) + '/retry', {
      method: 'POST',
    });
    const data = await res.json();
    if (data.success) {
      btn.textContent = 'Reopened ' + (data.identifier || '');
      btn.className = 'btn-retry success';
      setTimeout(() => loadReviews(), 2000);
    } else {
      btn.textContent = data.message || 'No task found';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = 'Error';
    btn.disabled = false;
  }
}


// --- Project selector (sticky) ---
const PROJECT_STORAGE_KEY = 'oompah_selected_project';

async function initProjectSelector() {
  const sel = document.getElementById('project-filter');
  if (!sel) return;
  try {
    const res = await fetch('/api/v1/projects');
    if (!res.ok) return;
    const projects = await res.json();
    if (projects.length === 0) { sel.style.display = 'none'; return; }
    const saved = localStorage.getItem(PROJECT_STORAGE_KEY) || '';
    sel.innerHTML = '<option value="">All Projects</option>' +
      projects.map(p => '<option value="' + escP(p.id) + '"' +
        (p.id === saved ? ' selected' : '') + '>' + escP(p.name) + '</option>').join('');
    sel.style.display = '';
  } catch(e) { sel.style.display = 'none'; }
}

function onProjectChange() {
  const sel = document.getElementById('project-filter');
  if (sel) localStorage.setItem(PROJECT_STORAGE_KEY, sel.value);
}

function escP(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function filterReviewsByProject(data) {
  const sel = document.getElementById('project-filter');
  const pid = sel ? sel.value : '';
  if (!pid) return data;
  return data.filter(item => item.project_id === pid);
}

_restoreSortPreference();
loadReviews();
initProjectSelector();

// Auto-refresh every 30s without flicker. Pause when the tab is hidden
// to avoid hammering the slow /api/v1/reviews endpoint while no one's
// looking; refresh immediately when the tab becomes visible again.
const REVIEWS_REFRESH_MS = 30000;
let _reviewsTimer = null;
function startReviewsAutoRefresh() {
  if (_reviewsTimer) return;
  _reviewsTimer = setInterval(() => loadReviews(true), REVIEWS_REFRESH_MS);
}
function stopReviewsAutoRefresh() {
  if (_reviewsTimer) { clearInterval(_reviewsTimer); _reviewsTimer = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopReviewsAutoRefresh();
  } else {
    loadReviews(true);
    startReviewsAutoRefresh();
  }
});
startReviewsAutoRefresh();
</script>

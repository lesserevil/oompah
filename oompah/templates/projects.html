
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>oompah - Projects</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --text-muted: #7d8590; --accent: #58a6ff;
      --green: #3fb950; --red: #f85149;
    }
    html { font-size: 125%; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border); }
    .toolbar h1 { font-size: 1.25rem; color: var(--accent); font-weight: 700; }
    .toolbar h1 a { color: var(--accent); text-decoration: none; }
    .toolbar h1 span { color: var(--text-muted); font-weight: 400; }
    button { background: var(--surface); color: var(--accent); border: 1px solid var(--border); padding: 0.3rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
    button:hover { background: rgba(88, 166, 255, 0.1); }
    .btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .btn-primary:hover { background: #79bbff; }
    .btn-danger { color: var(--red); border-color: rgba(248, 81, 73, 0.3); }
    .btn-danger:hover { background: rgba(248, 81, 73, 0.1); }
    .content { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
    .content h2 { font-size: 1.1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
    .project-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .project-name { font-size: 1rem; font-weight: 600; }
    .project-id { font-size: 0.7rem; color: var(--text-muted); font-family: 'SF Mono', 'Fira Code', monospace; }
    .field-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.35rem; font-size: 0.8rem; color: var(--text-muted); }
    .field-label { font-weight: 600; min-width: 80px; }
    .field-value { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.75rem; word-break: break-all; }
    .form-group { margin-bottom: 0.75rem; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.25rem; }
    .form-group input { width: 100%; padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.85rem; }
    /* Override the full-width input rule above for radios; they must be auto-sized. */
    .form-group input[type="radio"] { width: auto; padding: 0; border: none; background: transparent; }
    .epic-strategy-group { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.25rem; }
    /* Override the parent .form-group label rule (display:block, color:muted) — the per-option
       label contains rich content and shouldn't inherit the field-label styling. */
    .form-group label.epic-strategy-option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.6rem;
      align-items: start;
      cursor: pointer;
      padding: 0.55rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      transition: border-color 0.1s ease, background 0.1s ease;
      color: var(--text);
      font-size: 0.8rem;
      margin-bottom: 0;
    }
    .epic-strategy-option:hover { border-color: rgba(88, 166, 255, 0.4); }
    .epic-strategy-option:has(input:checked) { border-color: var(--accent); background: rgba(88, 166, 255, 0.06); }
    .epic-strategy-option > input[type="radio"] { margin-top: 0.15rem; flex-shrink: 0; cursor: pointer; }
    .epic-strategy-label { min-width: 0; }
    .epic-strategy-name { font-size: 0.85rem; color: var(--text); margin-bottom: 0.15rem; }
    .epic-strategy-name strong { font-weight: 600; }
    .epic-strategy-tag { display: inline-block; font-size: 0.65rem; font-weight: 500; color: var(--text-muted); border: 1px solid var(--border); border-radius: 4px; padding: 0 0.3rem; margin-left: 0.3rem; vertical-align: 0.05rem; }
    .epic-strategy-desc { color: var(--text-muted); line-height: 1.4; }
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; display: none; }
    .form-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.75rem; }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    .worktree-list { font-size: 0.75rem; color: var(--text-muted); font-family: monospace; margin-top: 0.5rem; }
    .edit-form { margin-top: 0.75rem; border-top: 1px solid var(--border); padding-top: 0.75rem; display: none; }
    .edit-form .form-group { margin-bottom: 0.5rem; }
    .btn-edit { color: var(--accent); border-color: rgba(88, 166, 255, 0.3); }
    .btn-edit:hover { background: rgba(88, 166, 255, 0.1); }
    .btn-pause { color: #d29922; border-color: rgba(210, 153, 34, 0.4); }
    .btn-pause:hover { background: rgba(210, 153, 34, 0.1); }
    .btn-resume { color: var(--green); border-color: rgba(63, 185, 80, 0.4); }
    .btn-resume:hover { background: rgba(63, 185, 80, 0.1); }
    /* Override the full-width input rule above for checkboxes; they must be auto-sized. */
    .form-group input[type="checkbox"] { width: auto; padding: 0; border: none; background: transparent; }
    .provider-whitelist-options { margin-top: 0.25rem; }
    .provider-whitelist-options label { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.2rem; font-size: 0.8rem; color: var(--text); cursor: pointer; margin-bottom: 0; }
  </style>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      fetch('/api/v1/errors', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          source: 'frontend',
          message: String(msg).slice(0, 200),
          detail: (err && err.stack) || (src + ':' + line + ':' + col),
          priority: 3
        })
      }).catch(function() {});
    };
    window.addEventListener('unhandledrejection', function(e) {
      var msg = e.reason ? (e.reason.message || String(e.reason)) : 'Unhandled promise rejection';
      fetch('/api/v1/errors', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          source: 'frontend',
          message: msg.slice(0, 200),
          detail: e.reason && e.reason.stack,
          priority: 3
        })
      }).catch(function() {});
    });
  </script>
</head>
<body>
  <div class="toolbar">
    <h1><a href="/">oompah</a> <span>/ Projects</span></h1>
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <select id="project-filter" onchange="onProjectChange()" style="display:none;padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);">
        <option value="">All Projects</option>
      </select>
      <button onclick="window.location='/'">Dashboard</button>
      <button onclick="window.location='/providers'">Providers</button>
    </div>
  </div>

  <div class="content">
    <h2>Projects <button class="btn-primary" onclick="toggleAddForm()">+ Add Project</button></h2>

    <div class="form-card" id="add-form">
      <!-- Note: provider_whitelist is intentionally omitted from the Add Project
           form. New projects dispatch to all providers by default (empty whitelist).
           Operators can restrict providers immediately after creation via the Edit
           form on the project card. The API correctly defaults provider_whitelist to
           [] on POST so edit-after-create is semantically safe with no interim
           window where an unwanted provider could be used (the project has no tasks
           yet at creation time). -->
      <div class="form-group">
        <label>Git Repository URL</label>
        <input type="text" id="add-repo" placeholder="https://github.com/org/repo.git or https://gitlab.com/group/project.git">
      </div>
      <div class="form-group">
        <label>Name (optional &mdash; defaults to repo name)</label>
        <input type="text" id="add-name" placeholder="">
      </div>
      <div class="form-group">
        <label>Branch (legacy single branch &mdash; use Branches below for multiple)</label>
        <input type="text" id="add-branch" placeholder="main" value="main">
      </div>
      <div class="form-group">
        <label>Branches (comma-separated, supports globs like release/*, hotfix/*)</label>
        <input type="text" id="add-branches" placeholder="main, release/*, hotfix/*" value="main">
        <span style="font-size:0.7rem;color:var(--text-muted);">First entry becomes default_branch</span>
      </div>
      <div class="form-group">
        <label>Default Branch (for new tasks)</label>
        <input type="text" id="add-default-branch" placeholder="main" value="main">
      </div>
      <div class="form-group">
        <label>Git User Name (defaults to global git config)</label>
        <input type="text" id="add-git-user-name" placeholder="">
      </div>
      <div class="form-group">
        <label>Git User Email (defaults to global git config)</label>
        <input type="text" id="add-git-user-email" placeholder="">
      </div>
      <div class="form-group">
        <label>Access Token (optional &mdash; GitHub/GitLab API token; falls back to env vars or gh/glab CLI)</label>
        <input type="password" id="add-access-token" placeholder="" autocomplete="off">
      </div>
      <div id="add-error" style="color:var(--red);font-size:0.8rem;margin-bottom:0.5rem;display:none;"></div>
      <div class="form-actions">
        <button onclick="toggleAddForm()">Cancel</button>
        <button class="btn-primary" onclick="addProject()">Add Project</button>
      </div>
    </div>

    <div id="project-list"></div>
  </div>

<script>
// Module-level provider cache populated by loadProviders().
// loadProjects() reads this when rendering edit-form checkbox options.
let _providers = [];

// Load all configured providers from the API and cache them.
// Failures are logged and silently swallowed — the projects page
// still works, but the whitelist edit form will only show unknown
// entries (already-stored names) rather than the full provider list.
async function loadProviders() {
  try {
    const res = await fetch('/api/v1/providers');
    if (res.ok) {
      _providers = await res.json();
    } else {
      console.error('loadProviders: HTTP ' + res.status + ' ' + res.statusText);
      _providers = [];
    }
  } catch (err) {
    console.error('loadProviders failed:', err);
    _providers = [];
  }
}

// Build the checkbox list for the provider_whitelist edit control.
// Merges the live provider list with any names already stored on the
// project that are NOT currently in the provider store — those unknown
// entries are shown checked so they are not silently discarded.
function renderProviderWhitelistCheckboxes(projectId, whitelist) {
  const wl = whitelist || [];
  const knownNames = new Set(_providers.map(function(p) { return p.name; }));
  // Unknown whitelist entries: stored on the project but not in provider store.
  const unknownInWhitelist = wl.filter(function(name) { return !knownNames.has(name); });
  const allOptions = _providers.map(function(p) { return { name: p.name, unknown: false }; })
    .concat(unknownInWhitelist.map(function(name) { return { name: name, unknown: true }; }));

  if (allOptions.length === 0) {
    return '<em style="color:var(--text-muted);font-size:0.75rem;">No providers configured — add providers first, then set the whitelist.</em>';
  }

  const cbName = 'edit-provider-whitelist-cb-' + esc(projectId);
  return allOptions.map(function(opt) {
    const checked = wl.includes(opt.name) ? 'checked' : '';
    const unknownNote = opt.unknown
      ? ' <em style="color:var(--text-muted);font-size:0.7rem;">(stored, not currently configured)</em>'
      : '';
    return '<label>'
      + '<input type="checkbox" name="' + esc(cbName) + '" value="' + esc(opt.name) + '" ' + checked + ' aria-label="Allow provider ' + esc(opt.name) + '">'
      + ' ' + esc(opt.name) + unknownNote
      + '</label>';
  }).join('\n');
}

async function loadProjects() {
  const container = document.getElementById('project-list');
  let projects;
  try {
    const res = await fetch('/api/v1/projects');
    if (!res.ok) {
      throw new Error('HTTP ' + res.status + ' ' + res.statusText);
    }
    projects = await res.json();
  } catch (err) {
    // Network failure (server unreachable, offline, dropped connection) or
    // non-OK response. Surface a user-visible retry UI instead of letting
    // the rejection bubble up to window.onunhandledrejection — that handler
    // POSTs every unhandled error to /api/v1/errors, which auto-files a
    // duplicate bug task for what is almost always a transient hiccup.
    console.error('loadProjects failed:', err);
    const msg = (err && err.message) ? err.message : String(err);
    container.innerHTML = '<div class="empty-state" role="alert" aria-live="polite">' +
      'Could not load projects.<br>' +
      '<span style="font-size:0.75rem;color:var(--text-muted);">' + esc(msg) + '</span><br><br>' +
      '<button type="button" class="btn-primary" onclick="loadProjects()" aria-label="Retry loading projects">Retry</button>' +
      '</div>';
    return;
  }
  if (projects.length === 0) {
    container.innerHTML = '<div class="empty-state">No projects configured.<br>Add a git repo with Backlog.md tasks to get started.</div>';
    return;
  }
  container.innerHTML = projects.map(p => `
    <div class="project-card" id="card-${esc(p.id)}">
      <div class="project-header">
        <span class="project-name">${esc(p.name)}</span>
        <span class="project-id">${esc(p.id)}</span>
      </div>
      <div class="field-row">
        <span class="field-label">Repo:</span>
        <span class="field-value">${esc(p.repo_url)}</span>
      </div>
      <div class="field-row">
        <span class="field-label">Local:</span>
        <span class="field-value">${esc(p.repo_path)}</span>
      </div>
      <div class="field-row">
        <span class="field-label">Branch:</span>
        <span class="field-value">${esc(p.branch)}</span>
      </div>
      <div class="field-row">
        <span class="field-label">Branches:</span>
        <span class="field-value">${esc((p.branches || []).join(', '))}</span>
      </div>
      <div class="field-row">
        <span class="field-label">Default Branch:</span>
        <span class="field-value">${esc(p.default_branch)}</span>
      </div>
      ${p.git_user_name ? `<div class="field-row">
        <span class="field-label">Git User:</span>
        <span class="field-value">${esc(p.git_user_name)} &lt;${esc(p.git_user_email || '')}&gt;</span>
      </div>` : ''}
      ${p.log_path ? `<div class="field-row">
        <span class="field-label">Log Path:</span>
        <span class="field-value">${esc(p.log_path)}</span>
      </div>` : ''}
      <div class="field-row">
        <span class="field-label">Token:</span>
        <span class="field-value">${p.has_access_token ? esc(p.access_token_masked) : '<em style="color:var(--text-muted);font-style:italic;">not set</em>'}</span>
      </div>
      <div class="field-row">
        <span class="field-label">YOLO:</span>
        <label style="cursor:pointer;display:flex;align-items:center;gap:0.4rem;">
          <input type="checkbox" ${p.yolo ? 'checked' : ''} onchange="toggleYolo('${esc(p.id)}', this.checked)">
          <span style="font-size:0.75rem;color:${p.yolo ? 'var(--green)' : 'var(--text-muted)'}">${p.yolo ? 'On — auto-merge, auto-resolve, auto-retry' : 'Off'}</span>
        </label>
      </div>
      <div class="field-row">
        <span class="field-label">Max in-flight PRs:</span>
        <span class="field-value">${esc(String(p.max_in_flight_prs || 1))}</span>
        <span style="font-size:0.7rem;color:var(--text-muted);margin-left:0.5rem;">(raise only when GitHub Merge Queue is enabled for this repo)</span>
      </div>
      <div class="field-row">
        <span class="field-label">Merge Queue:</span>
        <label style="cursor:pointer;display:flex;align-items:center;gap:0.4rem;">
          <input type="checkbox" ${p.merge_queue_enabled ? 'checked' : ''} onchange="toggleMergeQueue('${esc(p.id)}', this.checked)">
          <span style="font-size:0.75rem;color:${p.merge_queue_enabled ? 'var(--green)' : 'var(--text-muted)'}">${p.merge_queue_enabled ? 'On — enqueue PRs via GitHub Merge Queue' : 'Off — direct merge (default)'}</span>
        </label>
      </div>
      <div class="field-row">
        <span class="field-label">Epic Strategy:</span>
        <span class="field-value"><code>${esc(p.epic_strategy || 'flat')}</code></span>
        <span style="font-size:0.7rem;color:var(--text-muted);margin-left:0.5rem;">(controls how children of an epic relate to branches and CI)</span>
      </div>
      <div class="field-row">
        <span class="field-label">Dispatch:</span>
        <span class="field-value" style="color:${p.paused ? '#d29922' : 'var(--green)'}">${p.paused ? 'Paused — orchestrator will not dispatch new agents to this project' : 'Active'}</span>
      </div>
      <div class="field-row" data-field="provider-whitelist">
        <span class="field-label">Whitelist:</span>
        <span class="field-value">${(p.provider_whitelist && p.provider_whitelist.length > 0) ? esc(p.provider_whitelist.join(', ')) : '<em style="color:var(--text-muted);font-style:italic;">All providers</em>'}</span>
      </div>
      <div class="field-row">
        <span class="field-label">Test Command:</span>
        <span class="field-value">${p.test_command ? '<code>' + esc(p.test_command) + '</code>' : '<em style="color:var(--text-muted);font-style:italic;">not set — agent infers</em>'}</span>
      </div>
      ${p.test_command_full ? `<div class="field-row">
        <span class="field-label">Test Command (full):</span>
        <span class="field-value"><code>${esc(p.test_command_full)}</code></span>
      </div>` : ''}
      ${(p.test_skip_paths && p.test_skip_paths.length) ? `<div class="field-row">
        <span class="field-label">Skip paths:</span>
        <span class="field-value">${esc(p.test_skip_paths.join(', '))}</span>
      </div>` : ''}
      <div class="field-row" style="margin-top:0.75rem;">
        <button class="btn-edit" onclick="toggleEditForm('${esc(p.id)}')">Edit</button>
        ${p.paused
          ? `<button class="btn-resume" onclick="resumeProject('${esc(p.id)}')">Resume</button>`
          : `<button class="btn-pause" onclick="pauseProject('${esc(p.id)}')">Pause</button>`}
        <button onclick="showWorktrees('${esc(p.id)}')">Worktrees</button>
        <button class="btn-danger" onclick="deleteProject('${esc(p.id)}', '${esc(p.name)}')">Delete</button>
      </div>
      <div class="edit-form" id="edit-${esc(p.id)}">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="edit-name-${esc(p.id)}" value="${esc(p.name)}">
        </div>
        <div class="form-group">
          <label>Repo URL</label>
          <input type="text" id="edit-repo-url-${esc(p.id)}" value="${esc(p.repo_url)}">
        </div>
        <div class="form-group">
          <label>Branch (legacy single branch &mdash; use Branches below for multiple)</label>
          <input type="text" id="edit-branch-${esc(p.id)}" value="${esc(p.branch)}">
        </div>
        <div class="form-group">
          <label>Branches (comma-separated, supports globs like release/*, hotfix/*)</label>
          <input type="text" id="edit-branches-${esc(p.id)}" value="${esc((p.branches || []).join(', '))}">
          <span style="font-size:0.7rem;color:var(--text-muted);">First entry becomes default_branch if not explicitly set</span>
        </div>
        <div class="form-group">
          <label>Default Branch (for new tasks)</label>
          <input type="text" id="edit-default-branch-${esc(p.id)}" value="${esc(p.default_branch)}">
        </div>
        <div class="form-group">
          <label>Git User Name</label>
          <input type="text" id="edit-git-user-name-${esc(p.id)}" value="${esc(p.git_user_name || '')}">
        </div>
        <div class="form-group">
          <label>Git User Email</label>
          <input type="text" id="edit-git-user-email-${esc(p.id)}" value="${esc(p.git_user_email || '')}">
        </div>
        <div class="form-group">
          <label>Log Path (optional)</label>
          <input type="text" id="edit-log-path-${esc(p.id)}" value="${esc(p.log_path || '')}">
        </div>
        <div class="form-group">
          <label>Access Token ${p.has_access_token ? `(currently set: ${esc(p.access_token_masked)} &mdash; leave blank to keep, type a value to replace, or "clear" to remove)` : '(GitHub/GitLab API token; leave blank to use env vars or gh/glab CLI)'}</label>
          <input type="password" id="edit-access-token-${esc(p.id)}" value="" placeholder="${p.has_access_token ? '••••••••' : ''}" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Max in-flight PRs (default: 1 — only raise when GitHub Merge Queue is enabled for this repo)</label>
          <input type="number" id="edit-max-in-flight-prs-${esc(p.id)}" value="${esc(String(p.max_in_flight_prs || 1))}" min="1" step="1">
        </div>
        <div class="form-group">
          <label>Test Command (pre-push verification — agents run this exact command instead of inferring)</label>
          <input type="text" id="edit-test-command-${esc(p.id)}" value="${esc(p.test_command || '')}" placeholder="e.g. cargo test --workspace --lib">
        </div>
        <div class="form-group">
          <label>Test Command Full (optional, broader pre-merge-queue coverage)</label>
          <input type="text" id="edit-test-command-full-${esc(p.id)}" value="${esc(p.test_command_full || '')}" placeholder="e.g. cargo test --workspace">
        </div>
        <div class="form-group">
          <label>Test Skip Paths (optional, comma-separated globs to exclude flaky/hardware/network tests)</label>
          <input type="text" id="edit-test-skip-paths-${esc(p.id)}" value="${esc((p.test_skip_paths || []).join(', '))}" placeholder="e.g. tests/integration/*, tests/hw/*">
        </div>
        <div class="form-group" data-field="provider-whitelist-edit">
          <label id="edit-provider-whitelist-label-${esc(p.id)}">Provider Whitelist <span style="font-weight:400;color:var(--text-muted);">(leave all unchecked to allow all providers)</span></label>
          <div class="provider-whitelist-options" id="edit-provider-whitelist-${esc(p.id)}" role="group" aria-labelledby="edit-provider-whitelist-label-${esc(p.id)}">
            ${renderProviderWhitelistCheckboxes(p.id, p.provider_whitelist)}
          </div>
          <span style="font-size:0.7rem;color:var(--text-muted);">Only agents using whitelisted providers will be dispatched to this project. Check none to allow all.</span>
        </div>
        <div class="form-group">
          <label>Epic Strategy (controls how children of an epic relate to branches and CI)</label>
          <div class="epic-strategy-group">
            <label class="epic-strategy-option">
              <input type="radio" name="edit-epic-strategy-${esc(p.id)}" value="flat" ${(p.epic_strategy || 'flat') === 'flat' ? 'checked' : ''}>
              <div class="epic-strategy-label">
                <div class="epic-strategy-name"><strong>flat</strong> <span class="epic-strategy-tag">default</span></div>
                <div class="epic-strategy-desc">Every task, including epic children, gets its own worktree off main. Each PR targets main; CI runs per child PR; merge queue serializes the merges.</div>
              </div>
            </label>
            <label class="epic-strategy-option">
              <input type="radio" name="edit-epic-strategy-${esc(p.id)}" value="stacked" ${p.epic_strategy === 'stacked' ? 'checked' : ''}>
              <div class="epic-strategy-label">
                <div class="epic-strategy-name"><strong>stacked</strong></div>
                <div class="epic-strategy-desc">Every task gets its own worktree, but children of an epic open their PR against the epic's branch. CI runs on each child PR; once all children land, the orchestrator pushes the epic branch and opens a single epic→main PR.</div>
              </div>
            </label>
            <label class="epic-strategy-option">
              <input type="radio" name="edit-epic-strategy-${esc(p.id)}" value="shared" ${p.epic_strategy === 'shared' ? 'checked' : ''}>
              <div class="epic-strategy-label">
                <div class="epic-strategy-name"><strong>shared</strong></div>
                <div class="epic-strategy-desc">Each epic gets ONE worktree and ONE branch shared by all of its children. Children commit directly to the epic branch (no per-child PRs, no per-child CI). Children dispatch SERIALLY within an epic; multiple epics still run in parallel up to the in-flight cap. Trade: loses intra-epic parallelism in exchange for fewer merges, fewer CI runs, no inter-child conflicts on main.</div>
              </div>
            </label>
          </div>
        </div>
        <div id="edit-error-${esc(p.id)}" style="color:var(--red);font-size:0.8rem;margin-bottom:0.5rem;display:none;"></div>
        <div class="form-actions">
          <button onclick="toggleEditForm('${esc(p.id)}')">Cancel</button>
          <button class="btn-primary" onclick="saveProject('${esc(p.id)}')">Save</button>
        </div>
      </div>
      <div class="worktree-list" id="wt-${esc(p.id)}" style="display:none;"></div>
    </div>
  `).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toggleAddForm() {
  const f = document.getElementById('add-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  document.getElementById('add-error').style.display = 'none';
}

async function addProject() {
  const repo = document.getElementById('add-repo').value.trim();
  const name = document.getElementById('add-name').value.trim() || undefined;
  const branch = document.getElementById('add-branch').value.trim() || 'main';
  const branchesRaw = document.getElementById('add-branches').value.trim();
  const branches = branchesRaw ? branchesRaw.split(',').map(s => s.trim()).filter(s => s.length > 0) : undefined;
  const defaultBranch = document.getElementById('add-default-branch').value.trim() || undefined;
  const gitUserName = document.getElementById('add-git-user-name').value.trim() || undefined;
  const gitUserEmail = document.getElementById('add-git-user-email').value.trim() || undefined;
  const accessToken = document.getElementById('add-access-token').value.trim() || undefined;
  const errEl = document.getElementById('add-error');
  if (!repo) {
    errEl.textContent = 'Repository URL is required';
    errEl.style.display = 'block';
    return;
  }
  let res;
  try {
    res = await fetch('/api/v1/projects', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({repo_url: repo, name, branch, branches, default_branch: defaultBranch, git_user_name: gitUserName, git_user_email: gitUserEmail, access_token: accessToken}),
    });
  } catch (err) {
    console.error('addProject fetch failed:', err);
    errEl.textContent = 'Network error: ' + ((err && err.message) || String(err));
    errEl.style.display = 'block';
    return;
  }
  if (res.ok) {
    toggleAddForm();
    document.getElementById('add-name').value = '';
    document.getElementById('add-repo').value = '';
    document.getElementById('add-branch').value = 'main';
    document.getElementById('add-branches').value = 'main';
    document.getElementById('add-default-branch').value = 'main';
    document.getElementById('add-git-user-name').value = '';
    document.getElementById('add-git-user-email').value = '';
    document.getElementById('add-access-token').value = '';
    loadProjects();
  } else {
    let data = {};
    try { data = await res.json(); } catch (e) { /* non-JSON body */ }
    errEl.textContent = (data.error && data.error.message) || 'Failed to add project';
    errEl.style.display = 'block';
  }
}

// Run a project mutator. Wraps fetch so transient network errors surface
// as a user-visible alert instead of an unhandled-rejection that the
// onunhandledrejection handler would auto-file as a P3 bug bead.
async function _runMutation(label, url, options) {
  try {
    const res = await fetch(url, options);
    if (!res.ok) {
      let data = {};
      try { data = await res.json(); } catch (e) { /* non-JSON body */ }
      const detail = (data.error && data.error.message) || (res.status + ' ' + res.statusText);
      alert(label + ' failed: ' + detail);
      return false;
    }
    return true;
  } catch (err) {
    console.error(label + ' failed:', err);
    alert(label + ' failed: ' + ((err && err.message) || String(err)));
    return false;
  }
}

async function toggleYolo(id, enabled) {
  await _runMutation('Toggle YOLO', '/api/v1/projects/' + id, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({yolo: enabled}),
  });
  loadProjects();
}

async function toggleMergeQueue(id, enabled) {
  await _runMutation('Toggle merge queue', '/api/v1/projects/' + id, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({merge_queue_enabled: enabled}),
  });
  loadProjects();
}

async function pauseProject(id) {
  await _runMutation('Pause project', '/api/v1/projects/' + id + '/pause', {method: 'POST'});
  loadProjects();
}

async function resumeProject(id) {
  await _runMutation('Resume project', '/api/v1/projects/' + id + '/resume', {method: 'POST'});
  loadProjects();
}

async function deleteProject(id, name) {
  if (!confirm('Delete project "' + name + '"? This does not delete the repo.')) return;
  await _runMutation('Delete project', '/api/v1/projects/' + id, {method: 'DELETE'});
  loadProjects();
}

function toggleEditForm(id) {
  const f = document.getElementById('edit-' + id);
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  const errEl = document.getElementById('edit-error-' + id);
  if (errEl) errEl.style.display = 'none';
}

async function saveProject(id) {
  const errEl = document.getElementById('edit-error-' + id);
  const name = document.getElementById('edit-name-' + id).value.trim();
  const repoUrl = document.getElementById('edit-repo-url-' + id).value.trim();
  const branch = document.getElementById('edit-branch-' + id).value.trim();
  const branchesRaw = document.getElementById('edit-branches-' + id).value.trim();
  const branches = branchesRaw ? branchesRaw.split(',').map(s => s.trim()).filter(s => s.length > 0) : undefined;
  const defaultBranch = document.getElementById('edit-default-branch-' + id).value.trim() || undefined;
  const gitUserName = document.getElementById('edit-git-user-name-' + id).value.trim();
  const gitUserEmail = document.getElementById('edit-git-user-email-' + id).value.trim();
  const logPath = document.getElementById('edit-log-path-' + id).value.trim();
  const accessTokenRaw = document.getElementById('edit-access-token-' + id).value;
  const accessToken = accessTokenRaw.trim();
  const maxInFlightPrsRaw = document.getElementById('edit-max-in-flight-prs-' + id).value.trim();
  if (!name) {
    errEl.textContent = 'Name is required';
    errEl.style.display = 'block';
    return;
  }
  const maxInFlightPrs = parseInt(maxInFlightPrsRaw, 10);
  if (isNaN(maxInFlightPrs) || maxInFlightPrs < 1) {
    errEl.textContent = 'Max in-flight PRs must be a positive integer (>= 1)';
    errEl.style.display = 'block';
    return;
  }
  const testCommand = document.getElementById('edit-test-command-' + id).value.trim();
  const testCommandFull = document.getElementById('edit-test-command-full-' + id).value.trim();
  const testSkipPathsRaw = document.getElementById('edit-test-skip-paths-' + id).value.trim();
  const testSkipPaths = testSkipPathsRaw
    ? testSkipPathsRaw.split(',').map(s => s.trim()).filter(s => s.length > 0)
    : [];
  // Read the chosen epic_strategy from the radio group. Default to "flat"
  // when no radio is selected (defensive — should not happen because one
  // radio is always pre-checked).
  const epicStrategyEl = document.querySelector('input[name="edit-epic-strategy-' + id + '"]:checked');
  const epicStrategy = epicStrategyEl ? epicStrategyEl.value : 'flat';
  // Collect the provider whitelist from the checkbox group.
  // Empty selection sends [] so the whitelist is cleared and all providers
  // are allowed. This is intentional and distinct from "not sent" (undefined).
  const providerWhitelistCbs = document.querySelectorAll('input[name="edit-provider-whitelist-cb-' + id + '"]:checked');
  const providerWhitelist = Array.from(providerWhitelistCbs).map(function(cb) { return cb.value; });
  const body = {name, branch, branches, default_branch: defaultBranch, max_in_flight_prs: maxInFlightPrs, epic_strategy: epicStrategy, provider_whitelist: providerWhitelist};
  if (repoUrl) body.repo_url = repoUrl;
  if (gitUserName) body.git_user_name = gitUserName;
  if (gitUserEmail) body.git_user_email = gitUserEmail;
  body.log_path = logPath || null;
  body.test_command = testCommand || null;
  body.test_command_full = testCommandFull || null;
  body.test_skip_paths = testSkipPaths;
  // Token semantics: leaving the field blank keeps the existing value untouched;
  // typing "clear" removes it; any other value replaces it.
  if (accessToken === 'clear') {
    body.access_token = null;
  } else if (accessToken) {
    body.access_token = accessToken;
  }
  let res;
  try {
    res = await fetch('/api/v1/projects/' + id, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
  } catch (err) {
    console.error('saveProject fetch failed:', err);
    errEl.textContent = 'Network error: ' + ((err && err.message) || String(err));
    errEl.style.display = 'block';
    return;
  }
  if (res.ok) {
    loadProjects();
  } else {
    let data = {};
    try { data = await res.json(); } catch (e) { /* non-JSON body */ }
    errEl.textContent = (data.error && data.error.message) || 'Failed to save project';
    errEl.style.display = 'block';
  }
}

async function showWorktrees(id) {
  const el = document.getElementById('wt-' + id);
  if (el.style.display !== 'none') { el.style.display = 'none'; return; }
  let data;
  try {
    const res = await fetch('/api/v1/projects/' + id + '/worktrees');
    if (!res.ok) {
      throw new Error('HTTP ' + res.status + ' ' + res.statusText);
    }
    data = await res.json();
  } catch (err) {
    console.error('showWorktrees fetch failed:', err);
    el.innerHTML = '<em style="color:var(--red);">Could not load worktrees: ' + esc((err && err.message) || String(err)) + '</em>';
    el.style.display = 'block';
    return;
  }
  const wts = data.worktrees || [];
  el.innerHTML = wts.length > 0
    ? '<strong>Active worktrees:</strong><br>' + wts.map(w => esc(w)).join('<br>')
    : '<em>No active worktrees</em>';
  el.style.display = 'block';
}


// --- Project selector (sticky) ---
const PROJECT_STORAGE_KEY = 'oompah_selected_project';

async function initProjectSelector() {
  const sel = document.getElementById('project-filter');
  if (!sel) return;
  try {
    const res = await fetch('/api/v1/projects');
    if (!res.ok) return;
    const projects = await res.json();
    if (projects.length === 0) { sel.style.display = 'none'; return; }
    const saved = localStorage.getItem(PROJECT_STORAGE_KEY) || '';
    sel.innerHTML = '<option value="">All Projects</option>' +
      projects.map(p => '<option value="' + escP(p.id) + '"' +
        (p.id === saved ? ' selected' : '') + '>' + escP(p.name) + '</option>').join('');
    sel.style.display = '';
  } catch(e) { sel.style.display = 'none'; }
}

function onProjectChange() {
  const sel = document.getElementById('project-filter');
  if (sel) localStorage.setItem(PROJECT_STORAGE_KEY, sel.value);
}

function escP(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Load providers first so renderProviderWhitelistCheckboxes() has the
// full provider list available when loadProjects() renders edit forms.
// initProjectSelector() is independent and can run in parallel.
loadProviders().then(function() { loadProjects(); });
initProjectSelector();
</script>

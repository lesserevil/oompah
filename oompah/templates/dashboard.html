
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>oompah</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --orange: #d18616;
      --purple: #bc8cff;
    }
    html { font-size: 125%; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 1.25rem;
      color: var(--accent);
      font-weight: 700;
    }
    .toolbar .status {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    button {
      background: var(--surface);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
    }
    button:hover { background: rgba(88, 166, 255, 0.1); }
    button.active {
      background: rgba(88, 166, 255, 0.15);
      border-color: var(--accent);
    }

    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .view-toggle button {
      border: none;
      border-radius: 0;
      padding: 0.3rem 0.6rem;
    }
    .view-toggle button + button {
      border-left: 1px solid var(--border);
    }

    .main-area {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .board {
      display: flex;
      gap: 1rem;
      padding: 1rem 1.5rem;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      align-items: flex-start;
    }

    /* Swimlane view */
    .board.swimlane-view {
      flex-direction: column;
      align-items: stretch;
      overflow-y: auto;
      overflow-x: hidden;
      gap: 0;
      padding: 1rem calc(1.5rem - 1px);
    }
    .swimlane {
      border: 1px solid var(--border);
      border-radius: 10px;
      margin: 0 0 0.75rem 0;
      background: var(--surface);
    }
    .swimlane-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }
    .swimlane.collapsed .swimlane-header {
      border-bottom: none;
    }
    .swimlane-toggle {
      font-size: 0.7rem;
      color: var(--text-muted);
      transition: transform 0.15s;
    }
    .swimlane.collapsed .swimlane-toggle {
      transform: rotate(-90deg);
    }
    .swimlane-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }
    .swimlane-counts {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .swimlane-actions button {
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
    }
    .swimlane-columns {
      display: flex;
      gap: 1rem;
      padding: 0.5rem 0;
      overflow-x: auto;
    }
    .swimlane.collapsed .swimlane-columns {
      display: none;
    }
    .swimlane-columns .column {
      background: transparent;
      border: none;
      border-radius: 0;
      max-height: none;
    }

    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      min-width: 280px;
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 80px);
    }
    .column-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      cursor: grab;
    }
    .column-header:active { cursor: grabbing; }
    .column-header.col-drag-over {
      background: rgba(88, 166, 255, 0.15);
      border-bottom-color: var(--blue);
    }
    .column-header .col-grip {
      color: var(--text-muted);
      opacity: 0.4;
      font-size: 0.7rem;
      margin-right: 0.4rem;
      user-select: none;
    }
    .column-header:hover .col-grip { opacity: 0.8; }
    .column-header .col-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .column-header .col-count {
      font-size: 0.7rem;
      background: var(--border);
      color: var(--text-muted);
      padding: 0.1rem 0.5rem;
      border-radius: 10px;
      font-weight: 600;
    }
    .column-body {
      padding: 0.5rem;
      overflow-y: auto;
      flex: 1;
      min-height: 60px;
    }
    .column-body.drag-over {
      background: rgba(88, 166, 255, 0.05);
      outline: 2px dashed var(--accent);
      outline-offset: -4px;
      border-radius: 0 0 10px 10px;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.5rem;
      cursor: grab;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .card:hover {
      border-color: var(--accent);
    }
    .card.dragging {
      opacity: 0.4;
    }
    .card-id {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.4rem;
    }
    .card-id-left {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .card-title {
      font-size: 0.85rem;
      font-weight: 500;
      line-height: 1.3;
      cursor: text;
      padding: 2px 4px;
      margin: -2px -4px;
      border-radius: 4px;
      border: 1px solid transparent;
      outline: none;
      min-height: 1.3em;
    }
    .card-title:hover { border-color: var(--border); }
    .card-title:focus {
      border-color: var(--accent);
      background: var(--surface);
      cursor: text;
    }
    .card-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      line-height: 1.3;
      cursor: text;
      padding: 2px 4px;
      margin-left: -4px;
      margin-right: -4px;
      border-radius: 4px;
      border: 1px solid transparent;
      outline: none;
      max-height: 3.9em;
      overflow: hidden;
    }
    .card-desc:hover { border-color: var(--border); }
    .card-desc:focus {
      border-color: var(--accent);
      background: var(--surface);
      cursor: text;
      max-height: none;
    }
    .card-desc:empty::before {
      content: "Add description...";
      color: var(--border);
      font-style: italic;
    }

    .priority-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .p0 { background: rgba(248, 81, 73, 0.2); color: var(--red); }
    .p1 { background: rgba(209, 134, 22, 0.2); color: var(--orange); }
    .p2 { background: rgba(210, 153, 34, 0.2); color: var(--yellow); }
    .p3 { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
    .p4 { background: rgba(125, 133, 144, 0.15); color: var(--text-muted); }

    /* Type icon badge on all cards */
    .type-icon {
      font-size: 0.75rem;
      line-height: 1;
      cursor: default;
      user-select: none;
      title: attr(title);
    }

    /* Merged badge on closed cards */
    .merged-badge {
      font-size: 0.6rem;
      font-weight: 600;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      background: rgba(136, 87, 229, 0.2);
      color: var(--purple, #bc8cff);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* Draft Epic badge on epic cards with 'draft' label */
    .draft-epic-badge {
      font-size: 0.6rem;
      font-weight: 600;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent, #58a6ff);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* Draft badge on swimlane headers for draft epics */
    .swimlane-draft-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent, #58a6ff);
      font-family: 'SF Mono', 'Fira Code', monospace;
      vertical-align: middle;
    }

    /* Epic badge on child cards */
    .epic-badge {
      font-size: 0.6rem;
      font-weight: 600;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      background: rgba(188, 140, 255, 0.15);
      color: var(--purple);
      cursor: pointer;
      position: relative;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* Epic tooltip */
    .epic-tooltip {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      width: 240px;
      z-index: 50;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }
    .epic-badge:hover .epic-tooltip {
      display: block;
    }
    .epic-tooltip-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    .epic-tooltip-desc {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      line-height: 1.3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    .epic-tooltip-link {
      font-size: 0.7rem;
      color: var(--accent);
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    .epic-tooltip-link:hover { text-decoration: underline; }

    .drop-indicator {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 2px 0;
      display: none;
    }
    .drop-indicator.visible {
      display: block;
    }

    /* Detail slide-out panel */
    .detail-panel {
      width: 0;
      overflow: hidden;
      border-left: 1px solid var(--border);
      background: var(--surface);
      transition: width 0.2s ease;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .detail-panel.open {
      width: 400px;
    }
    .detail-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .detail-panel-header h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .detail-panel-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
    }
    .detail-panel-close:hover { color: var(--text); background: none; }
    .detail-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    .detail-field {
      margin-bottom: 1rem;
    }
    .detail-field-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    .detail-field-value {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.4;
    }
    .detail-editable {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.4;
      cursor: text;
      padding: 2px 4px;
      margin: -2px -4px;
      border-radius: 4px;
      border: 1px solid transparent;
      outline: none;
      min-height: 1.3em;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .detail-editable:hover { border-color: var(--border); }
    .detail-editable:focus {
      border-color: var(--accent);
      background: var(--bg);
      cursor: text;
    }
    .detail-editable:empty::before {
      content: attr(data-placeholder);
      color: var(--border);
      font-style: italic;
    }
    .detail-children-list {
      list-style: none;
    }
    .detail-children-list li {
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-bottom: 0.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .detail-children-list li:hover {
      background: var(--bg);
    }
    .detail-child-state {
      font-size: 0.65rem;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      background: var(--border);
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* Comments */
    .comments-list {
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 0.5rem;
    }
    .comment {
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(48, 54, 61, 0.5);
    }
    .comment:last-child { border-bottom: none; }
    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.15rem;
    }
    .comment-author {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
    }
    .comment-time {
      font-size: 0.6rem;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .comment-text {
      font-size: 0.75rem;
      color: var(--text);
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .comment-input {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.5rem;
      font-size: 0.75rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 50px;
    }
    .comment-input:focus { border-color: var(--accent); }

    /* Agent status bar */
    .agent-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.4rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.72rem;
      flex-shrink: 0;
    }
    .agent-bar .agent-stat {
      color: var(--text-muted);
    }
    .agent-bar .agent-stat strong {
      color: var(--text);
    }
    .agent-bar .paused-badge {
      background: rgba(210, 153, 34, 0.2);
      color: var(--yellow);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-weight: 600;
    }
    .alerts-banner {
      background: rgba(210, 153, 34, 0.1);
      color: var(--yellow);
      padding: 0.2rem 1rem;
      font-size: 0.75rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .alerts-banner .alert-item {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .running-agents {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .running-agent-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: rgba(63, 185, 80, 0.1);
      border: 1px solid rgba(63, 185, 80, 0.3);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      font-size: 0.65rem;
      color: var(--green);
      font-family: 'SF Mono', 'Fira Code', monospace;
      cursor: pointer;
    }
    .running-agent-chip:hover {
      background: rgba(63, 185, 80, 0.2);
    }
    .running-agent-chip .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn-paused {
      color: var(--yellow) !important;
      border-color: var(--yellow) !important;
    }

    /* Questions notification dropdown */
    .questions-stat {
      position: relative;
    }
    .questions-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      z-index: 300;
      overflow: hidden;
    }
    .questions-dropdown.open {
      display: block;
    }
    .questions-dropdown-header {
      padding: 0.4rem 0.75rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
    }
    .questions-dropdown-item {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(48, 54, 61, 0.5);
      transition: background 0.1s;
    }
    .questions-dropdown-item:last-child {
      border-bottom: none;
    }
    .questions-dropdown-item:hover {
      background: rgba(88, 166, 255, 0.08);
    }
    .questions-dropdown-item-id {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.65rem;
      color: var(--accent);
    }
    .questions-dropdown-item-title {
      font-size: 0.75rem;
      color: var(--text);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Activity panel */
    .activity-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    .activity-overlay.open { display: flex; }
    .activity-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 700px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .activity-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .activity-header h3 {
      font-size: 0.9rem;
      color: var(--accent);
    }
    .activity-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1.25rem;
      font-size: 0.75rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .activity-entry {
      padding: 0.3rem 0;
      border-bottom: 1px solid rgba(48, 54, 61, 0.5);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: flex-start;
      cursor: pointer;
    }
    .activity-entry:hover { background: rgba(48, 54, 61, 0.3); }
    .activity-entry:last-child { border-bottom: none; }
    .activity-turn {
      color: var(--text-muted);
      min-width: 2rem;
      text-align: right;
      flex-shrink: 0;
    }
    .activity-kind {
      min-width: 5rem;
      flex-shrink: 0;
      font-weight: 600;
    }
    .activity-kind.thinking { color: var(--purple); }
    .activity-kind.tool_call { color: var(--yellow); }
    .activity-kind.tool_result { color: var(--text-muted); }
    .activity-kind.message { color: var(--green); }
    .activity-kind.error { color: var(--red); }
    .activity-summary {
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }
    .activity-detail {
      display: none;
      width: 100%;
      padding: 0.5rem 0.75rem;
      margin-top: 0.25rem;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
    }
    .activity-entry.expanded .activity-detail { display: block; }

    /* Create dialog */
    .dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .dialog-overlay.open {
      display: flex;
    }
    .dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 460px;
      max-width: 90vw;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .dialog h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .dialog label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;

    }
    .dialog label:first-of-type { margin-top: 0; }
    .dialog input, .dialog select, .dialog textarea {
      width: 100%;
      background: var(--bg);

      font-family: inherit;

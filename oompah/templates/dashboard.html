<script>
const COLUMNS = ['deferred', 'open', 'in_progress', 'closed'];
const COLUMN_LABELS = {deferred: 'Backlog', open: 'Open', in_progress: 'In Progress', closed: 'Closed'};

let boardData = {};
let allIssuesFlat = [];
let dragState = null;
const optimisticUpdates = {};  // identifier -> {state, priority, expiry}
let columnDragState = null;  // {sourceState, epicId (or null for flat)}
let viewMode = 'flat';
let collapsedSwimlanes = {};
let userToggledSwimlanes = {};  // Tracks explicit user toggles (true = user overrode default)
let orchPaused = false;
let lastRunningAgents = [];
let currentProjects = [];

// --- Edit-state tracking ---
// Bug fix: Track when user is inline-editing a card field so that incoming
// WebSocket updates do not destroy their in-progress edits by rebuilding the DOM.
let editingState = null;      // {identifier, field} or null
let _pendingBoardData = null; // queued board data to render after editing ends
let _editingDetailPanel = false; // true if user is typing in comment textarea

// --- WebSocket connection ---
let ws = null;
let wsReconnectTimer = null;

function connectWebSocket() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');

  ws.onopen = () => {
    document.getElementById('status-text').textContent = 'Connected';
    if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'state') {
        handleStateUpdate(msg.data);
      } else if (msg.type === 'issues') {
        if (currentProjects.length > 0) {
          renderBoard(filterByProject(msg.data));
          refreshOpenDetailPanel();
        }
      } else if (msg.type === 'activity') {
        handleActivityPush(msg.identifier, msg.entry);
        if (_openDetailIdentifier && msg.identifier === _openDetailIdentifier) {
          refreshOpenDetailPanel();
        }
      }
    } catch (e) { /* ignore parse errors */ }
  };

  ws.onclose = () => {
    document.getElementById('status-text').textContent = 'Reconnecting...';
    ws = null;
    wsReconnectTimer = setTimeout(connectWebSocket, 2000);
  };

  ws.onerror = () => {
    if (ws) ws.close();
  };
}

function handleStateUpdate(state) {
  // Update pause state
  orchPaused = state.paused || false;
  const pauseBtn = document.getElementById('btn-pause');
  if (orchPaused) {
    pauseBtn.textContent = 'Resume';
    pauseBtn.classList.add('btn-paused');
  } else {
    pauseBtn.textContent = 'Pause';
    pauseBtn.classList.remove('btn-paused');
  }

  // Render alerts inline in agent bar
  const warningsEl = document.getElementById('agent-warnings');
  const alerts = state.alerts || [];
  if (alerts.length > 0) {
    warningsEl.innerHTML = alerts.map(a => '&#9888; ' + esc(a.message)).join(' &middot; ');
  } else {
    warningsEl.textContent = '';
  }

  // Update agent stats
  document.getElementById('agent-count').textContent = state.counts.running;
  const totals = state.agent_totals || {};
  document.getElementById('agent-tokens').textContent = (totals.total_tokens || 0).toLocaleString();
  document.getElementById('agent-cost').textContent = '$' + (totals.estimated_cost || 0).toFixed(2);
  const budget = state.budget || {};
  if (budget.limit > 0) {
    // Show "$<spent> / $<limit>/<window>" so the operator can see the
    // rolling-window budget at a glance (e.g. "$1.23 / $50.00/hour").
    // window is one of "hour"/"day"/"week" from the orchestrator's
    // budget_window config; fall back to bare "$x / $y" if absent.
    const win = budget.window ? '/' + budget.window : '';
    document.getElementById('agent-budget').textContent =
      '$' + (budget.spent || 0).toFixed(2) + ' / $' + budget.limit.toFixed(2) + win;
  }

  // Reviews + proposed-foci badges come from the WS state payload now.
  updateReviewsBadge(state.reviews_summary || null);
  updateProposedFociBadge(state.proposed_foci_count || 0);

  // Render running agent chips
  const container = document.getElementById('running-agents');
  const running = state.running || [];

  // Optimistic dispatch update: when a state push contains a newly-running
  // agent, mark the matching issue as in_progress locally and re-render the
  // board immediately. This compensates for the throttled "issues" push
  // (oompah/server.py _ISSUES_THROTTLE_MS=3000), which can otherwise lag the
  // open->in_progress card movement up to 3s behind the agent-bar chip.
  // We only optimistically update on dispatch (newly-added running entries);
  // we do not speculate when an entry is removed because we don't know if
  // the agent succeeded, failed, or is being retried — the next throttled
  // "issues" push will set the correct final state.
  const previousRunningIds = new Set(
    lastRunningAgents.map(r => r.issue_identifier).filter(Boolean)
  );
  const newDispatchIds = running
    .map(r => r.issue_identifier)
    .filter(id => id && !previousRunningIds.has(id));
  if (newDispatchIds.length > 0) {
    for (const id of newDispatchIds) {
      optimisticUpdates[id] = {
        state: 'in_progress',
        priority: undefined,
        expiry: Date.now() + 10000,  // 10s window matches updateIssue()
      };
    }
    // Re-render the board to apply the optimistic in_progress state
    // immediately. applyOptimisticOverrides() (called inside renderBoard)
    // moves the issue between columns and self-clears once the server
    // confirms via the next "issues" push.
    if (boardData && Object.keys(boardData).length > 0) {
      renderBoard(boardData);
    }
  }

  lastRunningAgents = running;
  if (running.length === 0) {
    container.innerHTML = orchPaused ? '<span class="paused-badge">PAUSED</span>' : '';
  } else {
    container.innerHTML = running.map(r => {
      const id = esc(r.issue_identifier);
      return '<span class="running-agent-chip" onclick="openActivityPanel(&quot;' + id + '&quot;)">' +
        '<span class="dot"></span>' +
        id +
        (r.agent_profile ? ' (' + esc(r.agent_profile) + ')' : '') +
      '</span>';
    }).join('');
    if (orchPaused) {
      container.innerHTML += ' <span class="paused-badge">PAUSED</span>';
    }
  }

  // Update project filter dropdown
  const projects = state.projects || [];
  currentProjects = projects;
  const sel = document.getElementById('project-filter');
  if (sel && projects.length > 0) {
    // Use saved value from localStorage, falling back to current value
    const savedProjectId = localStorage.getItem('oompah_selected_project') || '';
    const curVal = sel.value || savedProjectId;
    sel.innerHTML = '<option value="">All Projects</option>' +
      projects.map(p => '<option value="' + esc(p.id) + '"' +
        (p.id === curVal ? ' selected' : '') + '>' + esc(p.name) + '</option>').join('');
    // If the saved project is valid, make sure it's selected
    if (savedProjectId && !sel.value) {
      const matchingOption = Array.from(sel.options).find(o => o.value === savedProjectId);
      if (matchingOption) sel.value = savedProjectId;
    }
    sel.style.display = '';
  } else if (sel && projects.length === 0) {
    sel.style.display = 'none';
    // Show empty state — no projects configured yet
    const board = document.getElementById('board');
    if (board) {
      board.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:4rem;color:var(--text-muted);font-size:0.95rem;gap:1rem;text-align:center;">' +
        '<div style="font-size:2rem;">📂</div>' +
        '<div>No projects configured.</div>' +
        '<a href="/projects-manage" style="color:var(--accent);text-decoration:underline;">Add a project to get started</a>' +
        '</div>';
    }
  }

  // Update activity panel if open
  const activityOverlay = document.getElementById('activity-overlay');
  if (activityOverlay && activityOverlay.classList.contains('open')) {
    const activeId = document.getElementById('activity-title').dataset.identifier;
    const agent = running.find(r => r.issue_identifier === activeId);
    if (agent && agent.focus_role) {
      // Update title with latest focus info
      let title = 'Agent: ' + activeId;
      const parts = [];
      if (agent.focus_role) parts.push(agent.focus_role);
      if (agent.agent_profile) parts.push(agent.agent_profile);
      if (parts.length > 0) title += ' — ' + parts.join(' · ');
      document.getElementById('activity-title').textContent = title;
    }
  }
}

// --- Orchestrator state (legacy fallback, replaced by WebSocket) ---
async function fetchOrchestratorState() {
  try {
    const res = await fetch('/api/v1/state');
    if (!res.ok) return;
    const state = await res.json();
    handleStateUpdate(state);
  } catch (e) { /* ignore */ }
}

async function togglePause() {
  const endpoint = orchPaused ? '/api/v1/orchestrator/resume' : '/api/v1/orchestrator/pause';
  await fetch(endpoint, {method: 'POST'});
  await fetchOrchestratorState();
}

// Reviews + proposed-foci badges are pushed via WebSocket state payloads
// (state.reviews_summary, state.proposed_foci_count). These updaters are
// pure DOM updaters with no fetches.
function updateReviewsBadge(summary) {
  const el = document.getElementById('reviews-stat');
  const countEl = document.getElementById('reviews-count');
  if (!summary) { el.style.display = 'none'; return; }
  const needsAttention = summary.needs_attention || 0;
  const needsRepoConfig = summary.needs_repo_config || 0;
  const total = summary.total || 0;
  const yoloPending = summary.yolo_pending || 0;
  const queued = summary.queued || 0;
  if (needsRepoConfig > 0) {
    // Red: GitHub repo settings need adjustment (auto-merge, branch
    // protection, etc.). Operator must fix — no agent can resolve this.
    // Takes precedence over conflicts/CI-failures because a repo-config
    // error blocks every PR in that project; clearing it unblocks
    // everything else. (oompah-zlz_2-btf.2)
    countEl.textContent = needsRepoConfig;
    countEl.style.color = 'var(--red, #f85149)';
    const label = el.querySelector('.reviews-label');
    label.textContent = (needsRepoConfig === 1) ? 'needs repo config' : 'need repo config';
    el.title = 'GitHub repo settings need adjustment — auto-merge or branch protection. Click to view per-PR details.';
    el.style.display = '';
  } else if (needsAttention > 0) {
    // Red: conflicts or failed CI need human action.
    countEl.textContent = needsAttention;
    countEl.style.color = 'var(--red, #f85149)';
    el.querySelector('.reviews-label').textContent =
      (summary.conflicts > 0) ? 'need resolution' : 'CI failures';
    el.title = '';
    el.style.display = '';
  } else if (total > 0) {
    // Blue: open PRs in flight. Yolo PRs auto-merge once CI clears, but
    // they block other dispatch in the project until then, so show them.
    countEl.textContent = total;
    countEl.style.color = 'var(--blue, #58a6ff)';
    let label;
    if (yoloPending === total && queued === total && total > 0) {
      // Every yolo PR is already in the GitHub merge queue.
      label = 'in queue';
    } else if (yoloPending === total && queued > 0) {
      // Mix of queued and awaiting-enqueue yolo PRs.
      label = queued + ' in queue, ' + (yoloPending - queued) + ' awaiting enqueue';
    } else if (yoloPending === total) {
      // All yolo, none queued yet — watchdog hasn't dispatched.
      label = (total === 1) ? 'awaiting enqueue' : 'auto-merging';
    } else {
      label = 'reviews waiting';
    }
    el.querySelector('.reviews-label').textContent = label;
    el.title = '';
    el.style.display = '';
  } else {
    el.style.display = 'none';
  }
}

function updateProposedFociBadge(count) {
  const el = document.getElementById('proposed-foci-stat');
  const countEl = document.getElementById('proposed-foci-count');
  if (count > 0) {
    countEl.textContent = count;
    el.style.display = '';
  } else {
    el.style.display = 'none';
  }
}

// Scan in-memory board data for issues with the 'asking_question' label and update the
// questions notification widget in the agent bar.
function scanQuestionsFromBoard() {
  const askingIssues = allIssuesFlat.filter(
    i => (i.labels || []).includes('asking_question')
  );
  const el = document.getElementById('questions-stat');
  const countEl = document.getElementById('questions-count');
  const dropdown = document.getElementById('questions-dropdown');
  if (!el || !countEl || !dropdown) return;

  if (askingIssues.length > 0) {
    countEl.textContent = askingIssues.length;
    el.style.display = '';
    el.setAttribute('aria-expanded', 'false');

    // Build dropdown items
    dropdown.innerHTML =
      '<div class="questions-dropdown-header">Waiting for your answer</div>' +
      askingIssues.map(issue =>
        '<div class="questions-dropdown-item" role="menuitem" tabindex="0"' +
          ' onclick="event.stopPropagation(); closeQuestionsDropdown(); openDetailPanel(\'' + esc(issue.identifier) + '\')"' +
          ' onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();event.stopPropagation();closeQuestionsDropdown();openDetailPanel(\'' + esc(issue.identifier) + '\')}">' +
          '<span class="questions-dropdown-item-id">' + esc(issue.identifier) + '</span>' +
          '<span class="questions-dropdown-item-title">' + esc(issue.title) + '</span>' +
        '</div>'
      ).join('');
  } else {
    el.style.display = 'none';
    closeQuestionsDropdown();
  }
}

function toggleQuestionsDropdown(e) {
  e.stopPropagation();
  const dropdown = document.getElementById('questions-dropdown');
  const stat = document.getElementById('questions-stat');
  if (!dropdown || !stat) return;
  const isOpen = dropdown.classList.contains('open');
  if (isOpen) {
    closeQuestionsDropdown();
  } else {
    dropdown.classList.add('open');
    stat.setAttribute('aria-expanded', 'true');
  }
}

function closeQuestionsDropdown() {
  const dropdown = document.getElementById('questions-dropdown');
  const stat = document.getElementById('questions-stat');
  if (dropdown) dropdown.classList.remove('open');
  if (stat) stat.setAttribute('aria-expanded', 'false');
}

function saveProjectFilter() {
  const sel = document.getElementById('project-filter');
  if (sel) {
    localStorage.setItem('oompah_selected_project', sel.value);
  }
}

// --- Hide merged toggle ---------------------------------------------------
// Render-time filter that hides closed beads with the 'merged' label.
// State is persisted in localStorage('oompah_hide_merged') as 'on'|'off'.
// Default: ON (the historical merged set is rarely useful for routine ops).
let _hideMergedHiddenCount = 0;

function isHideMergedOn() {
  const v = localStorage.getItem('oompah_hide_merged');
  // Default ON: missing key counts as 'on'
  return v !== 'off';
}

function setHideMergedLabel() {
  const labelEl = document.getElementById('hide-merged-label');
  if (!labelEl) return;
  const onOff = isHideMergedOn() ? 'ON' : 'OFF';
  labelEl.textContent = `In-flight only: ${onOff} (${_hideMergedHiddenCount} hidden)`;
}

function initHideMergedToggle() {
  const cb = document.getElementById('hide-merged-checkbox');
  if (cb) cb.checked = isHideMergedOn();
  setHideMergedLabel();
}

function toggleHideMerged() {
  const cb = document.getElementById('hide-merged-checkbox');
  if (cb) {
    localStorage.setItem('oompah_hide_merged', cb.checked ? 'on' : 'off');
  }
  setHideMergedLabel();
  // Re-render with current data
  if (boardData) renderBoard(boardData);
}

// "In-flight" predicate for a single bead, judged on its own state alone:
//   - state open or in_progress → in flight
//   - state closed with has_open_review=true → in flight (PR queued/CI)
//   - everything else (closed without PR, deferred, etc) → NOT in flight
function _isIndividuallyInFlight(issue) {
  if (!issue) return false;
  const state = (issue.state || '').trim().toLowerCase();
  if (state === 'open' || state === 'in_progress') return true;
  if (state === 'closed' && issue.has_open_review) return true;
  return false;
}

// Compute the set of issue ids to KEEP under the "In-flight only" filter.
// An id is kept if either:
//   1. It's individually in flight (open/in_progress, or closed-with-open-PR), OR
//   2. Any of its ancestors (parent epic, grandparent epic, ...) has an
//      in-flight descendant somewhere in its subtree.
// The second rule means: when an epic has any active work below it, show
// the epic AND every descendant in its subtree, including children whose
// own work is already merged. This preserves the "epic group" view.
function _computeInFlightShowSet(allIssues) {
  const byId = {};
  const childrenById = {};
  for (const i of allIssues) {
    byId[i.id] = i;
    if (i.parent_id) {
      (childrenById[i.parent_id] = childrenById[i.parent_id] || []).push(i.id);
    }
  }
  // Memoized "does this id's subtree (including itself) contain any
  // individually-in-flight bead?"
  const subtreeInFlight = Object.create(null);
  function hasInFlightSubtree(id, stack) {
    if (id in subtreeInFlight) return subtreeInFlight[id];
    if (stack.has(id)) return false; // cycle guard
    stack.add(id);
    const issue = byId[id];
    if (!issue) { subtreeInFlight[id] = false; stack.delete(id); return false; }
    if (_isIndividuallyInFlight(issue)) {
      subtreeInFlight[id] = true; stack.delete(id); return true;
    }
    for (const cid of (childrenById[id] || [])) {
      if (hasInFlightSubtree(cid, stack)) {
        subtreeInFlight[id] = true; stack.delete(id); return true;
      }
    }
    subtreeInFlight[id] = false; stack.delete(id);
    return false;
  }
  for (const id of Object.keys(byId)) hasInFlightSubtree(id, new Set());

  const show = new Set();
  for (const issue of allIssues) {
    if (_isIndividuallyInFlight(issue)) {
      show.add(issue.id);
      continue;
    }
    // Walk up the parent chain; show if any ancestor has in-flight subtree
    let cur = issue;
    const seen = new Set();
    while (cur && cur.parent_id && !seen.has(cur.parent_id)) {
      seen.add(cur.parent_id);
      if (subtreeInFlight[cur.parent_id]) { show.add(issue.id); break; }
      cur = byId[cur.parent_id];
    }
  }
  return show;
}

// Strip beads that aren't part of any in-flight tree from a grouped
// {state: [issues]} payload — but ONLY from the 'closed' column.
// Open/in_progress/deferred columns ALWAYS pass through unchanged so the
// operator never loses backlog visibility. The toggle's job is to declutter
// the wall of done work in the closed column (which can balloon to 400+
// entries), not to mask active work.
//
// The hidden-count label only reflects hidden CLOSED beads. We still need
// _computeInFlightShowSet over the full (project-filtered) tree because the
// closed-column decision depends on epic-subtree visibility (closed beads
// stay visible if any ancestor epic has an in-flight subtree).
function applyHideMergedFilter(data) {
  if (!isHideMergedOn()) {
    _hideMergedHiddenCount = 0;
    return data;
  }
  // Flatten to compute the show-set across the entire (project-filtered) tree.
  const allIssues = [];
  for (const issues of Object.values(data)) for (const i of issues) allIssues.push(i);
  const showSet = _computeInFlightShowSet(allIssues);

  let hidden = 0;
  const filtered = {};
  for (const [state, issues] of Object.entries(data)) {
    // Only filter the closed column. Other columns pass through unchanged so
    // backlog (deferred) and active work (open/in_progress) are always visible.
    if (state.toLowerCase() !== 'closed') {
      filtered[state] = issues;
      continue;
    }
    const kept = [];
    for (const issue of issues) {
      if (showSet.has(issue.id)) kept.push(issue);
      else hidden += 1;
    }
    filtered[state] = kept;
  }
  _hideMergedHiddenCount = hidden;
  return filtered;
}

// Backwards-compatible alias used by other call sites that expect a
// single-issue predicate. Note: this only checks the issue itself; it
// does NOT consider epic-subtree visibility (use applyHideMergedFilter
// for the full filter logic).
function isHiddenByMergedFilter(issue) {
  return !_isIndividuallyInFlight(issue);
}

function filterByProject(data) {
  const sel = document.getElementById('project-filter');
  const pid = sel ? sel.value : '';
  if (!pid) return data;
  const filtered = {};
  for (const [state, issues] of Object.entries(data)) {
    const matching = issues.filter(i => i.project_id === pid);
    if (matching.length > 0) filtered[state] = matching;
  }
  return filtered;
}

async function fetchIssues() {
  const filter = document.getElementById('project-filter');
  const pid = filter ? filter.value : '';
  const url = pid ? '/api/v1/issues?project_id=' + encodeURIComponent(pid) : '/api/v1/issues';
  const res = await fetch(url);
  if (!res.ok) return null;
  return await res.json();
}

function moveIssueInBoard(identifier, newState) {
  // Move an issue between columns in the local boardData
  if (!boardData) return;
  for (const [state, issues] of Object.entries(boardData)) {
    const idx = issues.findIndex(i => i.identifier === identifier);
    if (idx !== -1) {
      const [issue] = issues.splice(idx, 1);
      issue.state = newState;
      if (!boardData[newState]) boardData[newState] = [];
      boardData[newState].push(issue);
      return;
    }
  }
}

async function updateIssue(identifier, fields) {
  // Record optimistic state to suppress rubber-banding from stale WebSocket data
  optimisticUpdates[identifier] = {
    state: fields.status,
    priority: fields.priority,
    expiry: Date.now() + 10000,  // 10 second window
  };
  const res = await fetch(`/api/v1/issues/${identifier}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(fields),
  });
  return res.ok;
}

async function toggleEpicDraft(epicIdentifier, isDraft, projectId) {
  try {
    if (isDraft) {
      // Remove 'draft' label then set status to deferred
      const delUrl = `/api/v1/issues/${encodeURIComponent(epicIdentifier)}/labels/draft` +
        (projectId ? `?project_id=${encodeURIComponent(projectId)}` : '');
      await fetch(delUrl, {method: 'DELETE'});
    } else {
      // Add 'draft' label then set status to deferred
      await fetch(`/api/v1/issues/${encodeURIComponent(epicIdentifier)}/labels`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({label: 'draft', project_id: projectId}),
      });
    }
    // In both cases, set status to deferred
    await fetch(`/api/v1/issues/${encodeURIComponent(epicIdentifier)}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({status: 'deferred', project_id: projectId}),
    });
    await refreshBoard();
  } catch (err) {
    console.error('toggleEpicDraft failed:', err);
  }
}

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('btn-flat').classList.toggle('active', mode === 'flat');
  document.getElementById('btn-swimlane').classList.toggle('active', mode === 'swimlane');
  renderBoard(boardData);
}

// Build flat list of all issues from grouped data
function flattenIssues(data) {
  const all = [];
  for (const state of Object.keys(data)) {
    for (const issue of data[state]) {
      all.push(issue);
    }
  }
  return all;
}

// Is this issue a swimlane parent? (epic, or any issue with children)
function isSwimlaneParent(issue) {
  return issue.issue_type === 'epic' || !!issue.children_counts;
}

// Get epic/parent info by ID from flat list
function getEpicById(epicId) {
  return allIssuesFlat.find(i => i.id === epicId && isSwimlaneParent(i));
}

function applyOptimisticOverrides(data) {
  // Override stale server data with recent optimistic updates
  const now = Date.now();
  for (const id of Object.keys(optimisticUpdates)) {
    if (optimisticUpdates[id].expiry < now) {
      delete optimisticUpdates[id];
      continue;
    }
    const upd = optimisticUpdates[id];
    // Find the issue in any column and move it to the correct one
    for (const [state, issues] of Object.entries(data)) {
      const idx = issues.findIndex(i => i.identifier === id);
      if (idx !== -1) {
        const issue = issues[idx];
        const targetState = upd.state || issue.state;
        if (upd.priority !== undefined) issue.priority = upd.priority;
        if (targetState !== state) {
          issues.splice(idx, 1);
          if (!data[targetState]) data[targetState] = [];
          issue.state = targetState;
          data[targetState].push(issue);
        }
        // If server confirms our update, clear it early
        if ((!upd.state || issue.state === upd.state) &&
            (upd.priority === undefined || issue.priority === upd.priority)) {
          delete optimisticUpdates[id];
        }
        break;
      }
    }
  }
  return data;
}

function renderBoard(data) {
  data = applyOptimisticOverrides(data);

  // Bug fix: If the user is currently editing a card field, defer the
  // full DOM rebuild. Store the latest data and render it once the
  // user finishes editing (on blur).
  if (editingState) {
    _pendingBoardData = data;
    // Still update the in-memory data so other lookups stay current
    // (unfiltered — toggling Hide merged off must be able to recover
    // the merged-closed beads without refetching).
    boardData = data;
    allIssuesFlat = flattenIssues(data);
    return;
  }

  // Keep the unfiltered payload as boardData so re-renders triggered by
  // the Hide-merged toggle, swimlane collapse, view-mode flip, etc. can
  // recover hidden beads without an extra fetch.
  boardData = data;
  // Apply the render-time Hide-merged filter. This is purely cosmetic —
  // /api/v1/issues and WebSocket pushes still carry the full set.
  data = applyHideMergedFilter(data);
  setHideMergedLabel();
  allIssuesFlat = flattenIssues(data);
  _pendingBoardData = null;
  const board = document.getElementById('board');
  board.innerHTML = '';

  if (viewMode === 'swimlane') {
    board.className = 'board swimlane-view';
    renderSwimlaneView(board, data);
  } else {
    board.className = 'board';
    renderFlatView(board, data);
  }

  document.getElementById('status-text').textContent =
    `Updated ${new Date().toLocaleTimeString()}`;

  // Update questions-waiting notification from fresh board data
  scanQuestionsFromBoard();
}

function renderFlatView(board, data) {
  for (const col of COLUMNS) {
    const allInCol = data[col] || [];
    // Filter out non-draft epics in flat view — they appear as swimlane headers
    // Draft epics are shown as cards so they're visible before they have children
    const issues = allInCol.filter(i => !isSwimlaneParent(i) || (i.labels || []).includes('draft'));
    const column = document.createElement('div');
    column.className = 'column';
    column.dataset.state = col;

    column.innerHTML = `
      <div class="column-header" draggable="true">
        <span><span class="col-grip">&#8942;&#8942;</span><span class="col-title">${COLUMN_LABELS[col]}</span></span>
        <span class="col-count">${issues.length}</span>
      </div>
      <div class="column-body" data-state="${col}"></div>
    `;

    const header = column.querySelector('.column-header');
    setupColumnDrag(header, col, null);
    const body = column.querySelector('.column-body');
    setupDropZone(body);

    for (let i = 0; i < issues.length; i++) {
      const indicator = document.createElement('div');
      indicator.className = 'drop-indicator';
      indicator.dataset.position = String(i);
      body.appendChild(indicator);
      body.appendChild(createCard(issues[i]));
    }
    const lastIndicator = document.createElement('div');
    lastIndicator.className = 'drop-indicator';
    lastIndicator.dataset.position = String(issues.length);
    body.appendChild(lastIndicator);

    board.appendChild(column);
  }
}

function isEpicInactive(epic) {
  // An epic is "inactive" (unopened) if it has no children in backlog, open, or in_progress.
  // Only epics with all active/potential work counts at 0 are considered inactive.
  const counts = epic.children_counts || {deferred: 0, open: 0, in_progress: 0, closed: 0};
  return (counts.deferred || 0) === 0 &&
         (counts.open || 0) === 0 &&
         (counts.in_progress || 0) === 0;
}

function renderSwimlaneView(board, data) {
  // Collect non-draft epics as swimlane headers; draft epics appear as cards in the orphan swimlane
  const epics = allIssuesFlat.filter(i => isSwimlaneParent(i) && !(i.labels || []).includes('draft'));
  const epicIds = new Set(epics.map(e => e.id));
  // Orphans: non-parent issues with no parent, PLUS draft parents (shown as cards)
  const orphans = allIssuesFlat.filter(i => (!isSwimlaneParent(i) || (i.labels || []).includes('draft')) && (!i.parent_id || !epicIds.has(i.parent_id)));

  // Render each epic as a swimlane
  for (const epic of epics) {
    const children = allIssuesFlat.filter(i => i.parent_id === epic.id && !isSwimlaneParent(i));
    const counts = epic.children_counts || {deferred: 0, open: 0, in_progress: 0, closed: 0};
    // Auto-collapse inactive epics unless the user has explicitly toggled this swimlane
    const autoCollapse = isEpicInactive(epic);
    const isCollapsed = userToggledSwimlanes[epic.id] ? collapsedSwimlanes[epic.id] : autoCollapse;
    collapsedSwimlanes[epic.id] = isCollapsed;

    const lane = document.createElement('div');
    lane.className = 'swimlane' + (isCollapsed ? ' collapsed' : '');
    lane.dataset.epicId = epic.id;

    const countsStr = `${counts.deferred} / ${counts.open} / ${counts.in_progress} / ${counts.closed}`;

    lane.innerHTML = `
      <div class="swimlane-header" onclick="toggleSwimlane('${esc(epic.id)}')">
        <span class="swimlane-toggle">&#9660;</span>
        <span class="swimlane-title">${esc(epic.title)}</span>
        ${(epic.labels || []).includes('draft') ? '<span class="swimlane-draft-badge" aria-label="Draft epic">Draft</span>' : ''}
        <span class="swimlane-counts" title="Backlog / Open / In Progress / Closed">${countsStr}</span>
        <span class="swimlane-actions">
          <button onclick="event.stopPropagation(); openCreateDialogForEpic('${esc(epic.id)}')">+ Child</button>
          <button onclick="event.stopPropagation(); openDetailPanel('${esc(epic.identifier)}')">Details</button>
          ${(() => { const isDraft = (epic.labels || []).includes('draft'); const draftBtnLabel = isDraft ? 'Finalize' : 'Mark as Draft'; return `<button onclick="event.stopPropagation(); toggleEpicDraft('${esc(epic.identifier)}', ${isDraft}, '${esc(epic.project_id || '')}')" aria-label="${isDraft ? 'Finalize epic' : 'Mark epic as draft'}">${draftBtnLabel}</button>`; })()}
        </span>
      </div>
      <div class="swimlane-columns"></div>
    `;

    const cols = lane.querySelector('.swimlane-columns');
    for (const col of COLUMNS) {
      const colIssues = children.filter(c => c.state.trim().toLowerCase() === col);
      const sc = document.createElement('div');
      sc.className = 'column';
      sc.innerHTML = `
        <div class="column-header" draggable="true">
          <span><span class="col-grip">&#8942;&#8942;</span><span class="col-title">${COLUMN_LABELS[col]}</span></span>
          <span class="col-count">${colIssues.length}</span>
        </div>
        <div class="column-body" data-state="${col}"></div>
      `;
      const scHeader = sc.querySelector('.column-header');
      setupColumnDrag(scHeader, col, epic.id);
      const scBody = sc.querySelector('.column-body');
      setupDropZone(scBody);
      for (let i = 0; i < colIssues.length; i++) {
        const ind = document.createElement('div');
        ind.className = 'drop-indicator';
        ind.dataset.position = String(i);
        scBody.appendChild(ind);
        scBody.appendChild(createCard(colIssues[i]));
      }
      const lastInd = document.createElement('div');
      lastInd.className = 'drop-indicator';
      lastInd.dataset.position = String(colIssues.length);
      scBody.appendChild(lastInd);
      cols.appendChild(sc);
    }

    board.appendChild(lane);
  }

  // Orphan swimlane (items not belonging to any epic)
  if (orphans.length > 0) {
    const lane = document.createElement('div');
    const isCollapsed = collapsedSwimlanes['_orphans'] || false;
    lane.className = 'swimlane' + (isCollapsed ? ' collapsed' : '');

    lane.innerHTML = `
      <div class="swimlane-header" onclick="toggleSwimlane('_orphans')">
        <span class="swimlane-toggle">&#9660;</span>
        <span class="swimlane-title" style="color: var(--text-muted);">Unassigned</span>
        <span class="swimlane-counts">${orphans.length} items</span>
      </div>
      <div class="swimlane-columns"></div>
    `;

    const cols = lane.querySelector('.swimlane-columns');
    for (const col of COLUMNS) {
      const colIssues = orphans.filter(o => o.state.trim().toLowerCase() === col);
      const sc = document.createElement('div');
      sc.className = 'column';
      sc.innerHTML = `
        <div class="column-header" draggable="true">
          <span><span class="col-grip">&#8942;&#8942;</span><span class="col-title">${COLUMN_LABELS[col]}</span></span>
          <span class="col-count">${colIssues.length}</span>
        </div>
        <div class="column-body" data-state="${col}"></div>
      `;
      const scHeader = sc.querySelector('.column-header');
      setupColumnDrag(scHeader, col, '_orphans');
      const scBody = sc.querySelector('.column-body');
      setupDropZone(scBody);
      for (let i = 0; i < colIssues.length; i++) {
        const ind = document.createElement('div');
        ind.className = 'drop-indicator';
        ind.dataset.position = String(i);
        scBody.appendChild(ind);
        scBody.appendChild(createCard(colIssues[i]));
      }
      const lastInd = document.createElement('div');
      lastInd.className = 'drop-indicator';
      lastInd.dataset.position = String(colIssues.length);
      scBody.appendChild(lastInd);
      cols.appendChild(sc);
    }

    board.appendChild(lane);
  }
}

function toggleSwimlane(id) {
  collapsedSwimlanes[id] = !collapsedSwimlanes[id];
  userToggledSwimlanes[id] = true;  // Mark as explicitly toggled by user
  renderBoard(boardData);
}

// Map issue type to a visual icon (emoji) for the card header
const TYPE_ICONS = {
  feature:  '✨',
  epic:     '𝍖',
  task:     '✅',
  bug:      '🐞',
  chore:    '🔧',
};

function getTypeIcon(issueType) {
  return TYPE_ICONS[issueType] || '📋';
}

function createCard(issue) {
  const card = document.createElement('div');
  card.className = 'card';
  card.draggable = true;
  card.dataset.id = issue.identifier;
  card.dataset.priority = issue.priority ?? 4;
  card.dataset.projectId = issue.project_id || '';

  const pClass = `p${issue.priority ?? 4}`;

  // Build epic badge HTML if this issue has a parent
  let epicBadgeHtml = '';
  if (issue.parent_id) {
    const epic = getEpicById(issue.parent_id);
    if (epic) {
      epicBadgeHtml = `
        <span class="epic-badge" onclick="event.stopPropagation()">
          ${esc(epic.identifier)}
          <span class="epic-tooltip">
            <div class="epic-tooltip-title">${esc(epic.title)}</div>
            <div class="epic-tooltip-desc">${esc(epic.description || 'No description')}</div>
            <span class="epic-tooltip-link" onclick="event.stopPropagation(); openDetailPanel('${esc(epic.identifier)}')">Details &rarr;</span>
          </span>
        </span>
      `;
    }
  }

  // Build draft badge if issue is a swimlane parent with the "draft" label
  const draftEpicBadgeHtml = (isSwimlaneParent(issue) && (issue.labels || []).includes('draft'))
    ? ' <span class="draft-epic-badge" aria-label="Draft Epic">Draft Epic</span>'
    : '';

  // Build merged badge if issue has the "merged" label
  const mergedBadgeHtml = (issue.labels || []).includes('merged')
    ? ' <span class="merged-badge">merged</span>'
    : '';

  const typeIcon = getTypeIcon(issue.issue_type);
  const typeLabel = issue.issue_type || 'task';

  card.innerHTML = `
    <div class="card-id">
      <span class="card-id-left">
        <span class="type-icon" title="${esc(typeLabel)}" aria-label="${esc(typeLabel)}">${typeIcon}</span>
        <span class="card-identifier">${esc(issue.identifier)}</span>
        ${epicBadgeHtml}
        ${draftEpicBadgeHtml}
        ${mergedBadgeHtml}
      </span>
      <span class="priority-badge ${pClass}">P${issue.priority ?? 4}</span>
    </div>
    <div class="card-title" contenteditable="true" spellcheck="false"
         data-field="title" data-id="${esc(issue.identifier)}">${esc(issue.title)}</div>
    <div class="card-desc" contenteditable="true" spellcheck="false"
         data-field="description" data-id="${esc(issue.identifier)}">${esc(issue.description || '')}</div>
    ${renderCardAttachments(issue)}
  `;

  // Click card ID to open detail panel
  card.querySelector('.card-identifier').style.cursor = 'pointer';
  card.querySelector('.card-identifier').addEventListener('click', (e) => {
    e.stopPropagation();
    openDetailPanel(issue.identifier);
  });

  // Drag handlers
  card.addEventListener('dragstart', e => {
    dragState = {
      identifier: issue.identifier,
      sourceState: issue.state.trim().toLowerCase(),
      priority: issue.priority,
      projectId: issue.project_id,
    };
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', issue.identifier);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    clearAllIndicators();
    dragState = null;
  });

  // Inline editing
  const titleEl = card.querySelector('.card-title');
  const descEl = card.querySelector('.card-desc');
  for (const el of [titleEl, descEl]) {
    el.addEventListener('mousedown', e => {
      if (document.activeElement === el) e.stopPropagation();
    });
    el.addEventListener('focus', () => {
      card.draggable = false;
      // Bug fix: Track that this field is being edited so renderBoard()
      // defers DOM rebuilds until the user finishes.
      editingState = { identifier: el.dataset.id, field: el.dataset.field };
    });
    el.addEventListener('blur', async () => {
      card.draggable = true;
      const field = el.dataset.field;
      const id = el.dataset.id;
      const newValue = el.textContent.trim();
      const pid = card.dataset.projectId;
      // Bug fix: Clear editing state *before* the async save so that
      // any queued board data can be rendered.
      editingState = null;
      await updateIssue(id, {[field]: newValue, project_id: pid});
      // Flush any board data that arrived while we were editing.
      if (_pendingBoardData) {
        const pending = _pendingBoardData;
        _pendingBoardData = null;
        renderBoard(pending);
      }
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); el.blur(); }
      if (e.key === 'Escape') el.blur();
    });
  }

  return card;
}

function setupColumnDrag(header, sourceState, epicId) {
  header.addEventListener('dragstart', e => {
    // Don't interfere with card drags — cards set dragState
    columnDragState = { sourceState, epicId };
    dragState = null;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', 'column:' + sourceState);
    header.style.opacity = '0.5';
  });
  header.addEventListener('dragend', () => {
    header.style.opacity = '';
    columnDragState = null;
    document.querySelectorAll('.column-header.col-drag-over').forEach(
      el => el.classList.remove('col-drag-over')
    );
  });

  // Column headers are also drop targets for other column drags
  header.addEventListener('dragover', e => {
    if (!columnDragState) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    header.classList.add('col-drag-over');
  });
  header.addEventListener('dragleave', () => {
    header.classList.remove('col-drag-over');
  });
  header.addEventListener('drop', async e => {
    e.preventDefault();
    header.classList.remove('col-drag-over');
    if (!columnDragState) return;

    const targetState = sourceState;  // this header's state
    const src = columnDragState;
    columnDragState = null;
    if (targetState === src.sourceState) return;

    // Determine which column header's epicId to use for scoping
    // In swimlane view, only move items within the source epic
    // Both source and target should be in the same swimlane context
    const scopeEpicId = src.epicId;

    // Collect cards to move from the source column
    const cardsToMove = getCardsInColumn(src.sourceState, scopeEpicId);
    if (cardsToMove.length === 0) return;

    // Confirm with user
    const label = COLUMN_LABELS[src.sourceState] || src.sourceState;
    const targetLabel = COLUMN_LABELS[targetState] || targetState;
    const scope = scopeEpicId ? (scopeEpicId === '_orphans' ? 'Unassigned' : 'this swimlane') : 'all visible';
    if (!confirm(`Move ${cardsToMove.length} item(s) from ${label} → ${targetLabel} (${scope})?`)) return;

    // Optimistic update
    for (const issue of cardsToMove) {
      moveIssueInBoard(issue.identifier, targetState);
    }
    renderBoard(boardData);

    // Fire API calls
    for (const issue of cardsToMove) {
      updateIssue(issue.identifier, {status: targetState, project_id: issue.project_id || ''});
    }
  });
}

function getCardsInColumn(state, epicId) {
  // Get visible cards in a column, scoped by epicId (swimlane) or project filter (flat)
  // Non-draft parents are swimlane headers; draft parents appear as cards in flat view
  const issues = (boardData[state] || []).filter(i => !isSwimlaneParent(i) || (i.labels || []).includes('draft'));
  if (epicId === null) {
    // Flat view — all visible (already filtered by project)
    return issues;
  } else if (epicId === '_orphans') {
    // Orphan swimlane — items with no parent or parent not a non-draft swimlane parent
    const epicIds = new Set(allIssuesFlat.filter(i => isSwimlaneParent(i) && !(i.labels || []).includes('draft')).map(e => e.id));
    return issues.filter(i => !i.parent_id || !epicIds.has(i.parent_id));
  } else {
    // Specific epic swimlane
    return issues.filter(i => i.parent_id === epicId);
  }
}

function setupDropZone(body) {
  body.addEventListener('dragover', e => {
    if (columnDragState) return;  // column drags handled by column headers
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    body.classList.add('drag-over');
    const indicators = body.querySelectorAll('.drop-indicator');
    let closest = null;
    let closestDist = Infinity;
    for (const ind of indicators) {
      const rect = ind.getBoundingClientRect();
      const dist = Math.abs(e.clientY - (rect.top + rect.height / 2));
      if (dist < closestDist) { closestDist = dist; closest = ind; }
    }
    clearAllIndicators();
    body.classList.add('drag-over');
    if (closest) closest.classList.add('visible');
  });

  body.addEventListener('dragleave', e => {
    if (!body.contains(e.relatedTarget)) {
      body.classList.remove('drag-over');
      clearAllIndicators();
    }
  });

  body.addEventListener('drop', async e => {
    e.preventDefault();
    body.classList.remove('drag-over');
    if (!dragState) return;

    const targetState = body.dataset.state;
    const identifier = dragState.identifier;

    // Find which drop indicator was active
    const activeIndicator = body.querySelector('.drop-indicator.visible');
    clearAllIndicators();

    if (targetState === dragState.sourceState) {
      // Same column — reorder by priority
      if (!activeIndicator) return;
      const dropPos = parseInt(activeIndicator.dataset.position, 10);
      const colIssues = (boardData[targetState] || []).filter(i => !isSwimlaneParent(i));
      // Exclude the dragged card from the list to compute neighbors
      const others = colIssues.filter(i => i.identifier !== identifier);
      // Clamp drop position after removing the dragged card
      const pos = Math.min(dropPos, others.length);
      const above = pos > 0 ? others[pos - 1] : null;
      const below = pos < others.length ? others[pos] : null;
      const abovePri = above ? (above.priority ?? 4) : 0;
      const belowPri = below ? (below.priority ?? 4) : 4;
      let newPri;
      if (!above) {
        newPri = Math.max(belowPri - 1, 0);
      } else if (!below) {
        newPri = Math.min(abovePri + 1, 4);
      } else {
        newPri = Math.round((abovePri + belowPri) / 2);
      }
      if (newPri === dragState.priority) return; // no change
      // Optimistic update
      const issue = colIssues.find(i => i.identifier === identifier);
      if (issue) issue.priority = newPri;
      boardData[targetState].sort((a, b) => (a.priority ?? 999) - (b.priority ?? 999));
      renderBoard(boardData);
      updateIssue(identifier, {priority: newPri, project_id: dragState.projectId});
      return;
    }

    // Different column — move between states
    moveIssueInBoard(identifier, targetState);
    renderBoard(boardData);
    updateIssue(identifier, {status: targetState, project_id: dragState.projectId});
  });
}

function clearAllIndicators() {
  document.querySelectorAll('.drop-indicator').forEach(el => el.classList.remove('visible'));
  document.querySelectorAll('.column-body').forEach(el => el.classList.remove('drag-over'));
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function refreshBoard() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    // Ask server to push fresh data via WebSocket
    ws.send(JSON.stringify({action: 'refresh'}));
    return;
  }
  // Fallback to REST
  document.getElementById('status-text').textContent = 'Refreshing...';
  const data = await fetchIssues();
  if (data) renderBoard(data);
  fetchOrchestratorState();
}

// --- Agent activity panel ---
let activityPollTimer = null;
// Cached activity entries for the currently-open panel. Used by the
// Verbose toggle to re-render without a network round-trip and by
// handleActivityPush to keep the cache in sync with what the server pushes.
let _activityEntries = [];
// Allowlist of activity kinds that count as "human-readable speech" in
// Verbose=OFF mode. Audited from oompah/orchestrator.py kind_map and
// oompah/api_agent.py _emit calls — `message` covers acp_text (model
// speech), acp_session_start, acp_result, and api_agent's own message
// emits ("Agent finished", "Task cancelled", etc.).
const _AGENT_LOG_MESSAGE_KINDS = ['message'];

function isAgentLogVerbose() {
  const v = localStorage.getItem('oompah_agent_log_verbose');
  // Default ON: missing key counts as 'on'
  return v !== 'off';
}

function setAgentLogVerboseLabel() {
  const labelEl = document.getElementById('activity-verbose-label');
  if (!labelEl) return;
  labelEl.textContent = 'Verbose: ' + (isAgentLogVerbose() ? 'ON' : 'OFF');
}

function initAgentLogVerboseToggle() {
  const cb = document.getElementById('activity-verbose-checkbox');
  if (cb) cb.checked = isAgentLogVerbose();
  setAgentLogVerboseLabel();
}

function toggleAgentLogVerbose() {
  const cb = document.getElementById('activity-verbose-checkbox');
  if (cb) {
    localStorage.setItem('oompah_agent_log_verbose', cb.checked ? 'on' : 'off');
  }
  setAgentLogVerboseLabel();
  // Re-render the panel from the cached entries — no network call.
  renderActivityList(_activityEntries);
  renderActivitySummary(_activityEntries);
}

async function openActivityPanel(identifier) {
  const agent = lastRunningAgents.find(r => r.issue_identifier === identifier);
  let title = 'Agent: ' + identifier;
  if (agent) {
    const parts = [];
    if (agent.focus_role) parts.push(agent.focus_role);
    if (agent.agent_profile) parts.push(agent.agent_profile);
    if (parts.length > 0) title += ' — ' + parts.join(' · ');
  }
  const titleEl = document.getElementById('activity-title');
  titleEl.textContent = title;
  titleEl.dataset.identifier = identifier;
  document.getElementById('activity-overlay').classList.add('open');
  initAgentLogVerboseToggle();
  await refreshActivity(identifier);
  // Only poll if WebSocket is not connected
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    activityPollTimer = setInterval(() => refreshActivity(identifier), 2000);
  }
}

function closeActivityPanel() {
  const el = document.getElementById('activity-overlay');
  if (el) el.classList.remove('open');
  if (activityPollTimer) { clearInterval(activityPollTimer); activityPollTimer = null; }
  _activityEntries = [];
}

// --- Activity summary header (live counters) ---
// Renders a compact status strip at the top of the activity panel
// showing Turn, Tools, Tokens, Cost, and Elapsed counters.
// Called from renderActivityList, handleActivityPush, and toggleAgentLogVerbose.
function renderActivitySummary(entries) {
  const summaryEl = document.getElementById('activity-summary');
  if (!summaryEl) return;

  if (!entries || entries.length === 0) {
    summaryEl.textContent = 'Waiting for first event...';
    return;
  }

  // Turn: highest turn field across all entries
  let maxTurn = 0;
  for (let i = 0; i < entries.length; i++) {
    const t = entries[i].turn || 0;
    if (t > maxTurn) maxTurn = t;
  }

  // Tools: count of tool_call kind entries
  let toolCount = 0;
  for (let i = 0; i < entries.length; i++) {
    if (entries[i].kind === 'tool_call') toolCount++;
  }

  // Tokens: scan back-to-front for most recent usage with input_tokens/output_tokens
  let inputTokens = null;
  let outputTokens = null;
  for (let i = entries.length - 1; i >= 0; i--) {
    const usage = entries[i].usage;
    if (usage) {
      if (inputTokens === null && usage.input_tokens != null) inputTokens = usage.input_tokens;
      if (outputTokens === null && usage.output_tokens != null) outputTokens = usage.output_tokens;
      if (inputTokens !== null && outputTokens !== null) break;
    }
  }

  // Cost: scan back-to-front for most recent usage.cost_usd
  let costUsd = null;
  for (let i = entries.length - 1; i >= 0; i--) {
    const usage = entries[i].usage;
    if (usage && usage.cost_usd != null) {
      costUsd = usage.cost_usd;
      break;
    }
  }

  // Elapsed: wall-clock since first event
  let elapsedStr = '';
  try {
    const firstTs = entries[0].ts;
    if (firstTs) {
      const startMs = new Date(firstTs).getTime();
      if (!isNaN(startMs)) {
        const elapsedMs = Date.now() - startMs;
        const totalSec = Math.floor(elapsedMs / 1000);
        const h = Math.floor(totalSec / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        const s = totalSec % 60;
        if (h > 0) elapsedStr = h + 'h ' + m + 'm ' + s + 's';
        else if (m > 0) elapsedStr = m + 'm ' + s + 's';
        else elapsedStr = s + 's';
      }
    }
  } catch (e) { /* ignore parse errors */ }

  // Format token counts (e.g. 14200 → "14.2K", 3100 → "3.1K")
  function fmtTokens(n) {
    if (n == null) return '—';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return String(n);
  }

  // Format cost (e.g. 0.0042 → "$0.0042")
  function fmtCost(c) {
    if (c == null) return '—';
    return '$' + c.toFixed(4);
  }

  // Build the summary string
  const parts = [];
  parts.push('Turn ' + maxTurn);
  parts.push(toolCount + ' tools');
  parts.push(fmtTokens(inputTokens) + ' in / ' + fmtTokens(outputTokens) + ' out');
  parts.push(fmtCost(costUsd));
  if (elapsedStr) parts.push(elapsedStr);

  summaryEl.textContent = parts.join(' · ');
}

// Patterns for entries we should hide even if kind='message' — these
// are session-metadata events whose detail field is JSON. Old entries
// (recorded before the orchestrator's kind_map was split into
// 'session' / 'message' on 2026-05-08) have kind='message' for both
// real model speech and session metadata; we filter on summary text
// to catch them regardless. New entries use kind='session' and the
// allowlist already excludes them.
const _AGENT_LOG_METADATA_SUMMARY_PATTERNS = [
  // acp_session_start
  /^ACP session: model=/,
  // acp_result — anchored to whole-string so real model speech that
  // happens to start with one of these words isn't accidentally hidden
  /^(completed|success|in_progress|stop_sequence|max_turns|cancelled)(\s+\(error\))?(\s+cost=\$\d+(\.\d+)?)?$/,
  // Raw event-name-as-summary entries from before kind_map's default
  // was changed from 'message' to 'other'. Old entries fell through
  // with kind='message' and summary equal to the literal event name
  // (e.g. "acp_permission_grant"). Filter those out too.
  /^acp_[a-z_]+$/,
];

function _isMetadataMessage(a) {
  const s = a.summary || '';
  return _AGENT_LOG_METADATA_SUMMARY_PATTERNS.some(re => re.test(s));
}

function renderActivityEntry(a) {
  const summary = a.summary || '';
  const verbose = isAgentLogVerbose();

  if (!verbose) {
    // Compact mode: only message-kind entries appear, full text inline,
    // no header pills, no expand/collapse. Also reject 'message' entries
    // whose summary matches metadata patterns (back-compat for entries
    // recorded before the kind_map split).
    if (!_AGENT_LOG_MESSAGE_KINDS.includes(a.kind)) return null;
    if (_isMetadataMessage(a)) return null;
    const detail = a.detail && a.detail.trim().length > 0 ? a.detail : '';
    // Prefer the longer of (detail, summary) so the operator sees the
    // full message — summary is truncated to 200 chars in oompah/api_agent.py.
    const text = (detail.length > summary.length ? detail : summary) || '(empty message)';
    const div = document.createElement('div');
    div.className = 'activity-entry-compact';
    div.textContent = text;
    return div;
  }

  // Verbose mode: existing behavior — collapsed row with kind/turn/summary
  // header and click-to-expand body containing the full detail.
  const detail = a.detail && a.detail.trim().length > 0 ? a.detail : null;
  const expandedContent = detail ? detail : summary;

  const div = document.createElement('div');
  div.className = 'activity-entry';
  div.addEventListener('click', () => div.classList.toggle('expanded'));

  div.innerHTML =
    '<div class="activity-entry-header">' +
      '<span class="activity-toggle">&#9654;</span>' +
      '<span class="activity-turn">' + esc(String(a.turn || '')) + '</span>' +
      '<span class="activity-kind ' + esc(a.kind || '') + '">' + esc(a.kind || '') + '</span>' +
      '<span class="activity-summary">' + esc(summary) + '</span>' +
    '</div>' +
    '<div class="activity-body-content">' + esc(expandedContent) + '</div>';
  return div;
}

// Render the full panel body from a list of cached entries, applying
// the current Verbose toggle state. Used by both refreshActivity (after
// fetching from the server) and toggleAgentLogVerbose (re-render from
// cache, no network).
function renderActivityList(entries) {
  const body = document.getElementById('activity-body');
  if (!body) return;
  if (!entries || entries.length === 0) {
    body.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:2rem;">No activity yet...</div>';
    renderActivitySummary(entries);
    return;
  }
  body.innerHTML = '';
  let rendered = 0;
  for (const a of entries) {
    const node = renderActivityEntry(a);
    if (node) {
      body.appendChild(node);
      rendered++;
    }
  }
  if (rendered === 0) {
    // All entries were filtered out (Verbose OFF + no message-kind entries yet).
    body.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:2rem;">No messages yet — toggle Verbose ON to see tool calls.</div>';
  }
  body.scrollTop = body.scrollHeight;
  renderActivitySummary(entries);
}

function handleActivityPush(identifier, entry) {
  // Only update if the activity panel is open for this agent
  const overlay = document.getElementById('activity-overlay');
  if (!overlay || !overlay.classList.contains('open')) return;
  const titleEl = document.getElementById('activity-title');
  if (titleEl.dataset.identifier !== identifier) return;
  // Keep the cache in sync so toggling Verbose can re-render without a fetch.
  _activityEntries.push(entry);
  const body = document.getElementById('activity-body');
  const node = renderActivityEntry(entry);
  if (!node) {
    // Entry is filtered out under the current Verbose state — keep it
    // in the cache; it will appear if the operator toggles Verbose ON.
    // Still update the summary counters so the operator sees activity.
    renderActivitySummary(_activityEntries);
    return;
  }
  // If the body still has a placeholder (no real entries yet), clear it
  // before appending so the placeholder doesn't sit above the new entry.
  if (body.querySelector('.activity-entry, .activity-entry-compact') === null) {
    body.innerHTML = '';
  }
  body.appendChild(node);
  body.scrollTop = body.scrollHeight;
  renderActivitySummary(_activityEntries);
}

async function refreshActivity(identifier) {
  try {
    const res = await fetch('/api/v1/agents/' + encodeURIComponent(identifier) + '/activity');
    const data = await res.json();
    const entries = data.activity || [];
    _activityEntries = entries;
    renderActivityList(entries);
    renderActivitySummary(entries);
  } catch(e) {}
}

// --- Detail panel ---
let _openDetailIdentifier = null;
let _detailRefreshTimer = null;

function refreshOpenDetailPanel() {
  if (!_openDetailIdentifier) return;
  if (!document.getElementById('detail-panel').classList.contains('open')) return;
  // Do not overwrite while user is editing title, description, or comment.
  const focused = document.activeElement;
  if (focused && focused.classList.contains('detail-editable')) return;
  const commentInput = document.getElementById('comment-input');
  if (commentInput && document.activeElement === commentInput) return;
  // Debounce: wait 500ms to batch rapid updates
  if (_detailRefreshTimer) clearTimeout(_detailRefreshTimer);
  _detailRefreshTimer = setTimeout(() => {
    _detailRefreshTimer = null;
    // Re-check: user may have started editing during the debounce window
    const stillFocused = document.activeElement;
    if (stillFocused && stillFocused.classList.contains('detail-editable')) return;
    const ci = document.getElementById('comment-input');
    if (ci && document.activeElement === ci) return;
    if (_openDetailIdentifier) openDetailPanel(_openDetailIdentifier);
  }, 500);
}

async function openDetailPanel(identifier) {
  _openDetailIdentifier = identifier;
  const panel = document.getElementById('detail-panel');
  const body = document.getElementById('detail-panel-body');
  const isRefresh = panel.classList.contains('open');
  if (!isRefresh) {
    body.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;">Loading...</div>';
  }
  panel.classList.add('open');

  const issue = allIssuesFlat.find(i => i.identifier === identifier);
  const pidParam = issue && issue.project_id ? `?project_id=${encodeURIComponent(issue.project_id)}` : '';
  const res = await fetch(`/api/v1/issues/${encodeURIComponent(identifier)}/detail${pidParam}`);
  if (!res.ok) {
    body.innerHTML = '<div style="color:var(--red);font-size:0.8rem;">Failed to load</div>';
    return;
  }
  const detail = await res.json();
  document.getElementById('detail-panel-title').textContent = detail.identifier;
  body.dataset.projectId = detail.project_id || '';

  const pClass = `p${detail.priority ?? 4}`;
  let html = `
    <div class="detail-field">
      <div class="detail-field-label">Title</div>
      <div class="detail-editable" contenteditable="true" spellcheck="false"
           id="detail-title-edit" data-field="title" data-placeholder="No title"
           data-id="${esc(detail.identifier)}">${esc(detail.title)}</div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Type</div>
      <div class="detail-field-value">${esc(detail.issue_type)}</div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">State</div>
      <div class="detail-field-value">${esc(detail.state)}</div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Priority</div>
      <div class="detail-field-value"><span class="priority-badge ${pClass}">P${detail.priority ?? 4}</span></div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Description</div>
      <div class="detail-editable" contenteditable="true" spellcheck="false"
           id="detail-desc-edit" data-field="description" data-placeholder="No description"
           data-id="${esc(detail.identifier)}">${esc(detail.description || '')}</div>
    </div>
    <div class="detail-field" id="detail-attachments-${esc(detail.identifier)}">
      <div class="detail-field-label">Attachments</div>
      <div class="detail-attachments-body">Loading…</div>
      <div class="detail-attachments-drop" data-identifier="${esc(detail.identifier)}">
        Drop images, audio, or PDFs here to attach
      </div>
    </div>
  `;
  // Asynchronously fetch + render after the detail HTML is in the DOM.
  setTimeout(() => loadIssueAttachments(detail.identifier), 0);

  if (detail.parent_id) {
    const epic = getEpicById(detail.parent_id);
    if (epic) {
      html += `
        <div class="detail-field">
          <div class="detail-field-label">Parent Epic</div>
          <div class="detail-field-value">
            <span class="epic-badge" style="cursor:pointer" onclick="openDetailPanel('${esc(epic.identifier)}')">${esc(epic.identifier)}</span>
            ${esc(epic.title)}
          </div>
        </div>
      `;
    }
  }

  if (detail.created_at) {
    html += `
      <div class="detail-field">
        <div class="detail-field-label">Created</div>
        <div class="detail-field-value">${new Date(detail.created_at).toLocaleString()}</div>
      </div>
    `;
  }

  if (detail.children && detail.children.length > 0) {
    html += `
      <div class="detail-field">
        <div class="detail-field-label">Children (${detail.children.length})</div>
        <ul class="detail-children-list">
          ${detail.children.map(c => `
            <li onclick="openDetailPanel('${esc(c.identifier)}')">
              <span>${esc(c.identifier)} ${esc(c.title)}</span>
              <span class="detail-child-state">${esc(c.state)}</span>
            </li>

    html += `
      <button onclick="openCreateDialogForEpic('${esc(detail.id)}')" style="margin-top:0.5rem;width:100%;">+ Create Child</button>
    `;
  } else if (isSwimlaneParent(detail)) {
    html += `

  // Comments section
  const comments = detail.comments || [];
  html += `
    <div class="detail-field" style="margin-top:1rem; border-top:1px solid var(--border); padding-top:1rem;">
      <div class="detail-field-label">Comments (${comments.length})</div>
      <div class="comments-list" id="comments-list">
        ${comments.length === 0 ? '<div style="color:var(--text-muted);font-size:0.75rem;padding:0.3rem 0;">No comments yet</div>' : ''}
        ${comments.map(c => `
          <div class="comment">
            <div class="comment-header">
              <span class="comment-author">${esc(c.author || 'unknown')}</span>
              <span class="comment-time">${c.created_at ? new Date(c.created_at).toLocaleString() : ''}</span>
            </div>
            <div class="comment-text">${esc(c.text)}</div>
          </div>
        `).join('')}
      </div>
      <div class="comment-input-area">
        <textarea id="comment-input" class="comment-input" placeholder="Add a comment..." rows="2"></textarea>
        <button onclick="submitComment('${esc(detail.identifier)}')" style="margin-top:0.3rem;width:100%;">Post Comment</button>
      </div>
    </div>
  `;

  // Preserve in-progress comment text across refreshes
  const prevInput = document.getElementById('comment-input');
  const prevText = prevInput ? prevInput.value : '';

  body.innerHTML = html;

  // Wire up editable title and description fields
  for (const el of body.querySelectorAll('.detail-editable')) {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey && el.id === 'detail-title-edit') {
        // Single-line feel for title: Enter saves
        e.preventDefault();
        el.blur();
      }
      if (e.key === 'Escape') el.blur();
    });
    el.addEventListener('blur', async () => {
      const field = el.dataset.field;
      const id = el.dataset.id;
      const newValue = el.textContent.trim();
      const pid = document.getElementById('detail-panel-body').dataset.projectId;
      await updateIssue(id, {[field]: newValue, project_id: pid});
    });
  }

  // Restore comment draft and scroll to bottom
  if (prevText) {
    const newInput = document.getElementById('comment-input');
    if (newInput) newInput.value = prevText;
  }
  const commentsList = document.getElementById('comments-list');
  if (commentsList) commentsList.scrollTop = commentsList.scrollHeight;
}

async function submitComment(identifier) {
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await fetch(`/api/v1/issues/${encodeURIComponent(identifier)}/comments`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text, author: 'user', project_id: document.getElementById('detail-panel-body').dataset.projectId}),
  });
  // Reload detail panel to show new comment
  openDetailPanel(identifier);
}

function closeDetailPanel() {
  _openDetailIdentifier = null;
  document.getElementById('detail-panel').classList.remove('open');
}

// --- Create dialog ---
let createParentId = null;

function populateProjectSelect(selectedId) {
  const row = document.getElementById('create-project-row');
  const sel = document.getElementById('create-project-select');
  if (!row || !sel) return;
  if (currentProjects.length === 0) {
    row.style.display = 'none';
    return;
  }
  row.style.display = '';
  sel.innerHTML = currentProjects.map(p =>
    '<option value="' + esc(p.id) + '"' + (p.id === selectedId ? ' selected' : '') + '>' + esc(p.name) + '</option>'
  ).join('');
}

function openCreateDialog() {
  createParentId = null;
  document.getElementById('create-dialog-title').textContent = 'Create Issue';
  document.getElementById('create-dialog').classList.add('open');
  document.getElementById('create-title').value = '';
  document.getElementById('create-desc').value = '';
  document.getElementById('create-type').value = 'task';
  document.getElementById('create-priority').value = '2';
  // Show all types when creating standalone
  const typeSelect = document.getElementById('create-type');
  typeSelect.querySelector('option[value="epic"]').style.display = '';
  // Pre-select the currently filtered project (if any)
  const filterSel = document.getElementById('project-filter');
  const defaultProjectId = filterSel ? filterSel.value : '';
  populateProjectSelect(defaultProjectId);
  setTimeout(() => document.getElementById('create-title').focus(), 50);
}

function openCreateDialogForEpic(epicId) {
  createParentId = epicId;
  const epic = allIssuesFlat.find(i => i.id === epicId);
  document.getElementById('create-dialog-title').textContent =
    epic ? `Create Child of ${epic.identifier}` : 'Create Child';
  document.getElementById('create-dialog').classList.add('open');
  document.getElementById('create-title').value = '';
  document.getElementById('create-desc').value = '';
  document.getElementById('create-type').value = 'task';
  document.getElementById('create-priority').value = '2';
  // Hide epic type when creating children
  const typeSelect = document.getElementById('create-type');
  typeSelect.querySelector('option[value="epic"]').style.display = 'none';
  // Pre-select the epic's project
  const epicProjectId = epic && epic.project_id ? epic.project_id : '';
  populateProjectSelect(epicProjectId);
  setTimeout(() => document.getElementById('create-title').focus(), 50);
}

function closeCreateDialog() {
  document.getElementById('create-dialog').classList.remove('open');
  createParentId = null;
}

async function submitCreateDialog() {
  const title = document.getElementById('create-title').value.trim();
  if (!title) return;

  const btn = document.getElementById('create-submit');
  btn.disabled = true;
  btn.textContent = 'Creating...';

  try {
    const body = {
      title,
      type: document.getElementById('create-type').value,
      description: document.getElementById('create-desc').value.trim() || undefined,
      priority: parseInt(document.getElementById('create-priority').value, 10),
    };
    if (createParentId) {
      body.parent_id = createParentId;
    }
    // Use project from dialog selector if available
    const projectSel = document.getElementById('create-project-select');
    if (projectSel && projectSel.value) {
      body.project_id = projectSel.value;
    }
    // Fallback: if no project selector (single-project mode), use the parent epic's project
    if (!body.project_id && createParentId) {
      const epic = allIssuesFlat.find(i => i.id === createParentId);
      if (epic && epic.project_id) body.project_id = epic.project_id;
    }
    // Last resort: selected project filter
    if (!body.project_id) {
      const sel = document.getElementById('project-filter');
      if (sel && sel.value) body.project_id = sel.value;
    }
    const res = await fetch('/api/v1/issues', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (res.ok) {
      closeCreateDialog();
      await refreshBoard();
      // Re-open detail panel if we were creating a child
      if (createParentId) {
        const epic = allIssuesFlat.find(i => i.id === createParentId);
        if (epic) openDetailPanel(epic.identifier);
      }
    }
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create';
  }
}

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeCreateDialog();
    closeDetailPanel();
    closeActivityPanel();
    closeQuestionsDropdown();
  }
});

// Close questions dropdown when clicking outside it
document.addEventListener('click', e => {
  const stat = document.getElementById('questions-stat');
  if (stat && !stat.contains(e.target)) {
    closeQuestionsDropdown();
  }
});

// --- Attachments (kanban thumbnails + detail panel) ---

const _IMAGE_MIMES = new Set(['image/png', 'image/jpeg', 'image/webp', 'image/gif', 'image/svg+xml']);

function _attachmentMimeFromPath(path) {
  const ext = (path.split('.').pop() || '').toLowerCase();
  return ({
    png: 'image/png', jpg: 'image/jpeg', jpeg: 'image/jpeg',
    webp: 'image/webp', gif: 'image/gif', svg: 'image/svg+xml',
    pdf: 'application/pdf',
    wav: 'audio/wav', mp3: 'audio/mpeg', m4a: 'audio/mp4', mp4: 'video/mp4',
  })[ext] || 'application/octet-stream';
}

// Render up to 3 thumbnails on a kanban card; shows a paperclip icon + count
// for non-image attachments.
function renderCardAttachments(issue) {
  const paths = (issue.attachments || []).filter(p => typeof p === 'string');
  if (!paths.length) return '';
  const images = paths.filter(p => _IMAGE_MIMES.has(_attachmentMimeFromPath(p)));
  const nonImages = paths.length - images.length;
  let html = '<div class="card-attachments">';
  for (const p of images.slice(0, 3)) {
    const url = '/api/v1/attachments/' + encodeURI(p);
    html += `<img class="card-attachment-thumb" loading="lazy" src="${esc(url)}" alt="" title="${esc(p)}">`;
  }
  const moreImgs = Math.max(0, images.length - 3);
  if (moreImgs > 0) html += `<span class="card-attachment-more">+${moreImgs}</span>`;
  if (nonImages > 0) html += `<span class="card-attachment-paperclip" title="${nonImages} non-image attachment(s)">📎 ${nonImages}</span>`;
  html += '</div>';
  return html;
}

async function loadIssueAttachments(identifier) {
  const root = document.getElementById('detail-attachments-' + identifier);
  if (!root) return;
  const body = root.querySelector('.detail-attachments-body');
  try {
    const res = await fetch('/api/v1/issues/' + encodeURIComponent(identifier) + '/attachments');
    if (!res.ok) {
      body.textContent = res.status === 503 ? 'Attachments are disabled for this server.' : '(none)';
      return;
    }
    const records = await res.json();
    if (!records.length) {
      body.textContent = '(none yet)';
    } else {
      const inputs = records.filter(r => !r.generated);
      const outputs = records.filter(r => r.generated);
      body.innerHTML =
        (inputs.length ? '<div class="attachment-section-title">Inputs</div>' + inputs.map(_renderAttachmentRow).join('') : '') +
        (outputs.length ? '<div class="attachment-section-title">Outputs</div>' + outputs.map(_renderAttachmentRow).join('') : '');
    }
  } catch (e) {
    body.textContent = 'Failed to load attachments';
  }
  _wireAttachmentDropZone(root, identifier);
}

function _renderAttachmentRow(rec) {
  const url = '/api/v1/attachments/' + encodeURI(rec.path);
  const mime = rec.mime_type || rec.mime || _attachmentMimeFromPath(rec.path);
  const name = (rec.path || '').split('/').pop();
  let preview = '';
  if (mime.startsWith('image/')) {
    preview = `<img class="attachment-preview" src="${esc(url)}" alt="${esc(name)}">`;
  } else if (mime.startsWith('audio/')) {
    preview = `<audio controls preload="none" src="${esc(url)}"></audio>`;
  } else if (mime === 'application/pdf') {
    preview = `<embed class="attachment-pdf" type="application/pdf" src="${esc(url)}">`;
  }
  const force = rec.generated ? '?force=generated' : '';
  return `
    <div class="attachment-row">
      ${preview}
      <div class="attachment-meta">
        <a href="${esc(url)}" target="_blank">${esc(name)}</a>
        <span class="attachment-mime">${esc(mime)}</span>
        ${rec.size ? `<span class="attachment-size">${rec.size} B</span>` : ''}
      </div>
      <button class="attachment-delete btn-sm" data-path="${esc(rec.path)}" data-force="${force}">×</button>
    </div>
  `;
}

function _wireAttachmentDropZone(root, identifier) {
  const drop = root.querySelector('.detail-attachments-drop');
  if (!drop) return;
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
  drop.addEventListener('drop', async e => {
    e.preventDefault();
    drop.classList.remove('drag');
    const files = Array.from(e.dataTransfer.files || []);
    for (const file of files) {
      const fd = new FormData();
      fd.append('file', file);
      try {
        const r = await fetch('/api/v1/issues/' + encodeURIComponent(identifier) + '/attachments', {
          method: 'POST', body: fd,
        });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          alert(`Upload failed for ${file.name}: ${(err.error && err.error.message) || r.status}`);
        }
      } catch (err) {
        alert(`Upload failed for ${file.name}: ${err.message || err}`);
      }
    }
    loadIssueAttachments(identifier);
  });
  // Wire up delete buttons.
  root.querySelectorAll('.attachment-delete').forEach(btn => {
    btn.addEventListener('click', async () => {
      const path = btn.getAttribute('data-path');
      const force = btn.getAttribute('data-force') || '';
      if (!confirm(`Remove ${path.split('/').pop()}?`)) return;
      const r = await fetch('/api/v1/attachments/' + encodeURI(path) + force, { method: 'DELETE' });
      if (r.ok) loadIssueAttachments(identifier);
      else alert('Delete failed: ' + r.status);
    });
  });
}

// Initial load via WebSocket (falls back to REST if WS fails)
initHideMergedToggle();
connectWebSocket();
</script>

<div class="dialog-overlay" id="create-dialog" onclick="if(event.target===this)closeCreateDialog()">
  <div class="dialog">
    <h2 id="create-dialog-title">Create Issue</h2>
    <div id="create-project-row" style="display:none;">
      <label for="create-project-select">Project</label>
      <select id="create-project-select"></select>
    </div>
    <label for="create-type">Type</label>
    <select id="create-type">
      <option value="task">Task</option>
      <option value="bug">Bug</option>
      <option value="feature">Feature</option>
      <option value="epic">Epic</option>
      <option value="chore">Chore</option>
    </select>
    <label for="create-title">Summary</label>
    <input type="text" id="create-title" placeholder="Brief issue summary"
           onkeydown="if(event.key==='Enter')submitCreateDialog()">
    <label for="create-priority">Priority</label>
    <select id="create-priority">
      <option value="0">P0 &mdash; Critical</option>
      <option value="1">P1 &mdash; High</option>
      <option value="2" selected>P2 &mdash; Medium</option>
      <option value="3">P3 &mdash; Low</option>
      <option value="4">P4 &mdash; Backlog</option>
    </select>
    <label for="create-desc">Description</label>
    <textarea id="create-desc" placeholder="Optional details..."></textarea>
    <div class="dialog-actions">
      <button onclick="closeCreateDialog()">Cancel</button>
      <button class="btn-primary" id="create-submit" onclick="submitCreateDialog()">Create</button>
    </div>
  </div>
</div>

<div class="activity-overlay" id="activity-overlay" onclick="if(event.target===this)closeActivityPanel()">
  <div class="activity-panel">
    <div class="activity-header">
      <h3 id="activity-title">Agent Activity</h3>
      <button onclick="closeActivityPanel()">&times;</button>
    </div>
    <div class="activity-toolbar" title="Verbose ON shows every entry (tool calls, permissions, etc) with click-to-expand. Verbose OFF shows only the agent's own messages, full text inline.">
      <label>
        <input type="checkbox" id="activity-verbose-checkbox" onchange="toggleAgentLogVerbose()">
        <span id="activity-verbose-label">Verbose: ON</span>
      </label>
    </div>
    <div id="activity-summary"></div>
    <div class="activity-body" id="activity-body">
      <div style="color: var(--text-muted); text-align: center; padding: 2rem;">Loading...</div>
    </div>
  </div>
</div>
</body>
